<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Encoder Rev12</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  font: 14px Arial, sans-serif;
  background: #0b0b0b;
  color: #f2f2f2;
}

.wrap {
  max-width: 1500px;
  margin: 18px auto;
  padding: 16px;
}

h1, h2 {
  margin: 0 0 10px 0;
  font-weight: 600;
}

label {
  display: block;
  margin: 10px 0 6px 0;
}

input[type="text"], textarea, select {
  width: 100%;
  box-sizing: border-box;
  background: #111;
  color: #f2f2f2;
  border: 1px solid #333;
  padding: 10px;
  border-radius: 6px;
  outline: none;
}

textarea {
  min-height: 90px;
  resize: vertical;
}

.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.btns {
  display: flex;
  gap: 10px;
  margin-top: 12px;
  flex-wrap: wrap;
}

button {
  background: #1f6feb;
  color: #fff;
  border: 0;
  padding: 10px 12px;
  border-radius: 6px;
  cursor: pointer;
}

button.secondary {
  background: #333;
}

button.tiny {
  padding: 7px 10px;
  font-size: 12px;
}

small {
  color: #b7b7b7;
}

.code {
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  font-size: 12px;
}

hr {
  border: 0;
  border-top: 1px solid #222;
  margin: 18px 0;
}

.snapshotGrid {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 12px;
  margin-top: 12px;
}

.snapshotCard {
  border: 1px solid #222;
  background: #0f0f0f;
  border-radius: 10px;
  overflow: hidden;
}

.snapshotPreview {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #000;
  overflow: hidden;
  cursor: pointer;
}

.snapshotFrame {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
  background: #000;
  pointer-events: none;
}

.snapshotOverlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(to top, rgba(0,0,0,0.58), rgba(0,0,0,0.02) 45%, rgba(0,0,0,0.10));
}

.snapshotBadge {
  position: absolute;
  top: 8px;
  left: 8px;
  background: rgba(0,0,0,0.78);
  border: 1px solid rgba(255,255,255,0.14);
  color: #fff;
  font-size: 11px;
  padding: 4px 7px;
  border-radius: 999px;
}

.snapshotOpen {
  position: absolute;
  right: 8px;
  bottom: 8px;
  background: rgba(31,111,235,0.92);
  color: #fff;
  font-size: 11px;
  padding: 4px 7px;
  border-radius: 999px;
}

.snapshotFallback {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 14px;
  color: #d8d8d8;
  background: radial-gradient(circle at center, #161616 0%, #0a0a0a 70%);
  font-size: 12px;
}

.snapshotMeta {
  padding: 10px;
}

.snapshotName {
  font-weight: 600;
  margin-bottom: 6px;
}

.snapshotRawUrl,
.snapshotPlayerUrl,
.snapshotOpenUrl {
  color: #d7d7d7;
  font-size: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 6px;
}

.snapshotLabel {
  color: #9ebcff;
  font-size: 11px;
  margin: 6px 0 2px 0;
}

.snapshotStatus {
  margin-top: 4px;
  font-size: 11px;
  color: #a9a9a9;
}

.itembtns {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 8px;
}

@media (max-width: 1500px) {
  .snapshotGrid { grid-template-columns: repeat(5, minmax(0, 1fr)); }
}
@media (max-width: 1280px) {
  .snapshotGrid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
}
@media (max-width: 1024px) {
  .snapshotGrid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
}
@media (max-width: 760px) {
  .snapshotGrid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
@media (max-width: 480px) {
  .snapshotGrid { grid-template-columns: 1fr; }
}
</style>
</head>

<body>
<div class="wrap">

<h1>Wallboard URL Encoder</h1>

<hr />

<h2>Saved stream grid</h2>
<small>
Click a preview to open the stream in a new window.
</small>

<div id="snapshotGrid" class="snapshotGrid"></div>

<hr />

<label for="base">Player base URL</label>
<input id="base" type="text" value="https://solutionssquad.github.io/shulboard/player.html" />

<label for="srcId">Stream ID</label>
<input id="srcId" type="text" value="STREAM" />

<label for="src">Stream URL</label>
<textarea id="src"></textarea>

<div class="row">
<div>
<label for="fit">fit</label>
<select id="fit">
<option value="contain" selected>contain</option>
<option value="cover">cover</option>
</select>
</div>

<div>
<label for="muted">muted</label>
<select id="muted">
<option value="1" selected>1</option>
<option value="0">0</option>
</select>
</div>
</div>

<label for="reload">reload</label>
<input id="reload" type="text" value="60" />

<div class="btns">
<button id="gen">Generate</button>
<button class="secondary" id="copy">Copy</button>
<button class="secondary" id="clear">Clear</button>
</div>

<label for="out">Output</label>
<textarea id="out" class="code" readonly></textarea>

<hr />

<h2>Decoder</h2>

<label for="fullUrl">Full player URL</label>
<textarea id="fullUrl"></textarea>

<div class="btns">
<button id="decode">Decode</button>
<button class="secondary" id="copyDecoded">Copy decoded</button>
</div>

<div class="row">
<div>
<label for="srcRaw">src raw</label>
<textarea id="srcRaw" class="code" readonly></textarea>
</div>
<div>
<label for="srcDecoded">src decoded</label>
<textarea id="srcDecoded" class="code" readonly></textarea>
</div>
</div>

</div>

<script>

/*
========================================================
DEVELOPER NOTES

Where to add more feeds:

Add more entries inside the STREAMS array below.
Each entry automatically creates one preview tile.

Example:

{ name: "My Feed", url: "https://example.com/live/master.m3u8" }

You do NOT need to manually add preview boxes anywhere else.
The grid is generated automatically from STREAMS.
========================================================
*/

function $(id){ return document.getElementById(id); }
function clean(s){ return (s||"").trim(); }

const STREAMS = [
{ name:"IRINN", url:"https://tv.irna.ir/live/stream/index.m3u8" },
{ name:"Live now fox", url:"https://fox-foxnewsnow-vizio.amagi.tv/playlist.m3u8" },
{ name:"IL13", url:"https://d2xg1g9o5vns8m.cloudfront.net/out/v1/66d4ac8748ce4a9298b4e40e48d1ae2f/index.m3u8" },
{ name:"ABC2", url:"https://abcnews-streams.akamaized.net/hls/live/2023561/abcnewshudson2/master.m3u8" },
{ name:"ABC3", url:"https://abcnews-streams.akamaized.net/hls/live/2023562/abcnewshudson3/master.m3u8" },
{ name:"ABC4", url:"https://abcnews-streams.akamaized.net/hls/live/2023563/abcnewshudson4/master.m3u8" }
];

function buildCustom(opts){

const base=clean(opts.base);
const src=clean(opts.src);
const fit=clean(opts.fit)||"contain";
const reload=clean(opts.reload)||"0";
const srcId=clean(opts.srcId)||"STREAM";

const params=new URLSearchParams();
params.set("ID",srcId);
params.set("src",src);
params.set("fit",fit);

if(opts.includeMuted){
params.set("muted",String(opts.muted||"1"));
}

const r=parseInt(reload,10);
if(!isNaN(r)&&r>0) params.set("reload",String(r));

return base+"?"+params.toString();
}

function build(){
return buildCustom({
base:$("base").value,
src:$("src").value,
fit:$("fit").value,
reload:$("reload").value,
srcId:$("srcId").value,
includeMuted:true,
muted:$("muted").value
});
}

function buildForStream(stream){
return buildCustom({
base:$("base").value,
src:stream.url,
fit:$("fit").value,
reload:$("reload").value,
srcId:stream.name.replace(/\s+/g,""),
includeMuted:true,
muted:$("muted").value
});
}

function buildOpenForStream(stream){
return buildCustom({
base:$("base").value,
src:stream.url,
fit:$("fit").value,
reload:$("reload").value,
srcId:stream.name.replace(/\s+/g,""),
includeMuted:false
});
}

async function copyText(text){
await navigator.clipboard.writeText(text);
}

function loadStreamToEncoder(stream){
$("src").value=stream.url;
$("srcId").value=stream.name.replace(/\s+/g,"");
$("out").value=build();
}

function openStreamPlayer(stream){
window.open(buildOpenForStream(stream),"_blank");
}

function renderSnapshotGrid(){

const host=$("snapshotGrid");
host.innerHTML="";

STREAMS.forEach(stream=>{

const normalUrl=buildForStream(stream);
const openUrl=buildOpenForStream(stream);
const previewUrl=buildCustom({
base:$("base").value,
src:stream.url,
fit:$("fit").value,
reload:$("reload").value,
srcId:stream.name.replace(/\s+/g,""),
includeMuted:true,
muted:"1"
});

const card=document.createElement("div");
card.className="snapshotCard";

const preview=document.createElement("div");
preview.className="snapshotPreview";
preview.onclick=()=>openStreamPlayer(stream);

const frame=document.createElement("iframe");
frame.className="snapshotFrame";
frame.src=previewUrl;

const overlay=document.createElement("div");
overlay.className="snapshotOverlay";

const badge=document.createElement("div");
badge.className="snapshotBadge";
badge.textContent=stream.name;

const open=document.createElement("div");
open.className="snapshotOpen";
open.textContent="Open";

preview.appendChild(frame);
preview.appendChild(overlay);
preview.appendChild(badge);
preview.appendChild(open);

const meta=document.createElement("div");
meta.className="snapshotMeta";

const name=document.createElement("div");
name.className="snapshotName";
name.textContent=stream.name;

const rawLabel=document.createElement("div");
rawLabel.className="snapshotLabel";
rawLabel.textContent="Raw feed URL";

const rawUrl=document.createElement("div");
rawUrl.className="snapshotRawUrl code";
rawUrl.textContent=stream.url;

const readyLabel=document.createElement("div");
readyLabel.className="snapshotLabel";
readyLabel.textContent="Normal generated URL";

const playerUrl=document.createElement("div");
playerUrl.className="snapshotPlayerUrl code";
playerUrl.textContent=normalUrl;

const openLabel=document.createElement("div");
openLabel.className="snapshotLabel";
openLabel.textContent="Open URL";

const openUrlEl=document.createElement("div");
openUrlEl.className="snapshotOpenUrl code";
openUrlEl.textContent=openUrl;

const btns=document.createElement("div");
btns.className="itembtns";

const loadBtn=document.createElement("button");
loadBtn.className="tiny";
loadBtn.textContent="Load";
loadBtn.onclick=()=>loadStreamToEncoder(stream);

const copyRawBtn=document.createElement("button");
copyRawBtn.className="tiny secondary";
copyRawBtn.textContent="Copy raw";
copyRawBtn.onclick=()=>copyText(stream.url);

const copyReadyBtn=document.createElement("button");
copyReadyBtn.className="tiny secondary";
copyReadyBtn.textContent="Copy ready";
copyReadyBtn.onclick=()=>copyText(normalUrl);

const openBtn=document.createElement("button");
openBtn.className="tiny secondary";
openBtn.textContent="Open";
openBtn.onclick=()=>openStreamPlayer(stream);

btns.append(loadBtn,copyRawBtn,copyReadyBtn,openBtn);

meta.append(name,rawLabel,rawUrl,readyLabel,playerUrl,openLabel,openUrlEl,btns);

card.append(preview,meta);

host.appendChild(card);

});

}

$("gen").onclick=()=>{$("out").value=build();}
$("copy").onclick=()=>copyText($("out").value);
$("clear").onclick=()=>{
$("src").value="";
$("out").value="";
};

renderSnapshotGrid();

</script>
</body>
</html>
