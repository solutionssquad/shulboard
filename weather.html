<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=714, initial-scale=1.0">
<title>Weather.gov Matched Dashboard</title>
<style>
:root{
  --w:714px;
  --h:225px;

  --bg:#000000;
  --text:#f2f6fb;
  --muted:#b4c2d6;
  --soft:#8fa3bf;

  --cyan:#68ddff;
  --cyan2:#b6f4ff;
  --cyan3:#36cfff;

  --green:#45e59a;
  --yellow:#ffd05d;
  --red:#ff7d7d;

  --sun:#ffd05d;
  --cloud:#eaf3ff;
  --cloud2:#cfe0f7;
  --moon:#c8d8f3;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  width:var(--w);
  height:var(--h);
  overflow:hidden;
  font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--text);
  background:#000;
}

body{
  background:
    linear-gradient(180deg, rgba(255,255,255,.015), rgba(255,255,255,0)),
    linear-gradient(180deg, #000000 0%, #000000 100%);
}

.shell{
  width:714px;
  height:225px;
  padding:10px 12px 8px;
  position:relative;
}

.layout{
  width:100%;
  height:100%;
  display:grid;
  grid-template-columns:212px 1fr;
  grid-template-rows:106px 1fr;
  gap:10px;
}

.current{
  grid-column:1;
  grid-row:1 / span 2;
  padding:2px 4px 0 0;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.chartPanel{
  grid-column:2;
  grid-row:1;
  position:relative;
}

.daysPanel{
  grid-column:2;
  grid-row:2;
  position:relative;
}

.toprow{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:8px;
}

.temp{
  font-size:52px;
  line-height:.9;
  font-weight:800;
  letter-spacing:-1.5px;
  color:var(--text);
}

.updated{
  font-size:11px;
  color:var(--muted);
  padding-top:3px;
  white-space:nowrap;
  font-weight:600;
}

.mid{
  display:grid;
  grid-template-columns:1fr 58px;
  gap:8px;
  align-items:center;
  margin-top:2px;
}

.condition{
  font-size:17px;
  font-weight:800;
  line-height:1.08;
  margin-top:2px;
  color:var(--text);
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.summary{
  margin-top:6px;
  font-size:12px;
  color:var(--muted);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  font-weight:600;
}

.iconBox{
  width:58px;
  height:58px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.iconBox svg{
  width:42px;
  height:42px;
}

.metrics{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:7px;
  margin-top:8px;
}

.metric{
  min-height:42px;
  border-radius:10px;
  background:linear-gradient(180deg, rgba(16,35,62,.55), rgba(15,31,55,.45));
  border:1px solid rgba(27,59,99,.6);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:4px 2px;
}

.metric .k{
  font-size:9px;
  color:var(--soft);
  text-transform:uppercase;
  letter-spacing:.8px;
  line-height:1;
  font-weight:700;
}

.metric .v{
  margin-top:4px;
  font-size:14px;
  font-weight:800;
  line-height:1;
  color:var(--text);
}

.banner{
  margin-top:8px;
  min-height:28px;
  border-radius:12px;
  background:linear-gradient(180deg, rgba(16,35,62,.50), rgba(15,31,55,.40));
  border:1px solid rgba(27,59,99,.6);
  display:flex;
  align-items:center;
  gap:7px;
  padding:0 10px;
  font-size:11px;
  font-weight:700;
  color:var(--text);
  overflow:hidden;
}

.dot{
  width:10px;
  height:10px;
  border-radius:999px;
  flex:0 0 auto;
  background:var(--green);
  box-shadow:0 0 10px rgba(69,229,154,.6);
}

.bannerViewport{
  position:relative;
  flex:1;
  min-width:0;
  overflow:hidden;
  height:16px;
  display:flex;
  align-items:center;
}

.bannerText{
  position:absolute;
  left:0;
  top:50%;
  transform:translateY(-50%);
  white-space:nowrap;
  will-change:transform;
}

.bannerText.scroll{
  animation-name:marqueeScroll;
  animation-timing-function:linear;
  animation-iteration-count:infinite;
}

@keyframes marqueeScroll{
  0%{
    transform:translate(0, -50%);
  }
  100%{
    transform:translate(calc(-1 * var(--scroll-distance, 0px)), -50%);
  }
}

.chartWrap{
  position:relative;
  width:100%;
  height:100%;
  overflow:hidden;
}

.chartWrap:before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(rgba(255,255,255,.02), rgba(255,255,255,0)),
    repeating-linear-gradient(90deg, rgba(255,255,255,.03) 0 1px, transparent 1px 58px);
  pointer-events:none;
}

.chartSvg{
  position:absolute;
  inset:0;
}

.chartLabels{
  position:absolute;
  left:10px;
  right:10px;
  bottom:3px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  pointer-events:none;
}

.chartLabel{
  text-align:center;
  transform:translateX(-50%);
  color:var(--text);
  font-size:9px;
  font-weight:700;
  white-space:nowrap;
}

.daysGrid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  height:100%;
}

.dayCard{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;
  padding:7px 5px 6px;
  overflow:hidden;
}

.dayName{
  font-size:11px;
  font-weight:800;
  line-height:1;
  color:var(--text);
}

.dayIcon{
  height:18px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.dayIcon svg{
  width:16px;
  height:16px;
}

.dayTemps{
  display:flex;
  align-items:baseline;
  gap:5px;
}

.high{
  font-size:14px;
  font-weight:800;
  line-height:1;
  color:var(--text);
}

.low{
  font-size:11px;
  color:var(--muted);
  line-height:1;
  font-weight:600;
}

.rainRow{
  width:88%;
  display:flex;
  align-items:center;
  gap:4px;
}

.rainTrack{
  flex:1;
  height:4px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  overflow:hidden;
}

.rainFill{
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg, var(--cyan3), var(--cyan2));
  box-shadow:0 0 10px rgba(54,207,255,.35);
}

.rainPct{
  min-width:18px;
  text-align:right;
  font-size:9px;
  font-weight:800;
  color:var(--text);
}

.loading .shimmer{
  background:linear-gradient(90deg, rgba(255,255,255,.04) 25%, rgba(255,255,255,.10) 50%, rgba(255,255,255,.04) 75%);
  background-size:200% 100%;
  animation:shine 1.6s linear infinite;
  color:transparent !important;
}
@keyframes shine{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}
</style>
</head>
<body>
<div class="shell">
  <div class="layout loading" id="app">
    <section class="current">
      <div>
        <div class="toprow">
          <div class="temp shimmer" id="temp">80°</div>
          <div class="updated shimmer" id="updated">Updated 4:00 PM</div>
        </div>

        <div class="mid">
          <div>
            <div class="condition shimmer" id="condition">Mostly Cloudy</div>
            <div class="summary shimmer" id="summary">Feels 80° • H 84° • L 72°</div>
          </div>
          <div class="iconBox" id="currentIcon"></div>
        </div>

        <div class="metrics">
          <div class="metric">
            <div class="k">Rain</div>
            <div class="v shimmer" id="rainNow">12%</div>
          </div>
          <div class="metric">
            <div class="k">Humidity</div>
            <div class="v shimmer" id="humidity">71%</div>
          </div>
          <div class="metric">
            <div class="k">Wind</div>
            <div class="v shimmer" id="wind">12 mph</div>
          </div>
        </div>

        <div class="banner" id="banner">
          <div class="dot" id="dot"></div>
          <div class="bannerViewport" id="bannerViewport">
            <div class="bannerText" id="bannerText">Loading Weather.gov forecast</div>
          </div>
        </div>
      </div>
    </section>

    <section class="chartPanel">
      <div class="chartWrap">
        <svg class="chartSvg" id="chart" viewBox="0 0 470 106" preserveAspectRatio="none"></svg>
        <div class="chartLabels" id="chartLabels"></div>
      </div>
    </section>

    <section class="daysPanel">
      <div class="daysGrid" id="daysGrid"></div>
    </section>
  </div>
</div>

<script>
const CONFIG = {
  latitude: 26.062438,
  longitude: -80.194453,
  timezone: "America/New_York",
  refreshMs: 5 * 60 * 1000,

  // This is the station used by the Weather.gov page for this coordinate:
  // "Current conditions at Fort Lauderdale/Hollywood International Airport (KFLL)".
  currentStation: "KFLL",
  preferredStations: ["KFLL", "KHWO", "KOPF", "KTMB"],
  apiBase: "https://api.weather.gov"
};

const NS = "http://www.w3.org/2000/svg";

function round(n){ return Math.round(Number(n)); }
function pad2(n){ return String(n).padStart(2, "0"); }
function clamp(n,min,max){ return Math.max(min, Math.min(max, n)); }
function val(obj){ return obj && obj.value !== undefined ? obj.value : null; }
function cToF(v){ return v === null || v === undefined || Number.isNaN(Number(v)) ? null : (Number(v) * 9 / 5) + 32; }
function mpsToMph(v){ return v === null || v === undefined || Number.isNaN(Number(v)) ? null : Number(v) * 2.2369362920544; }
function firstNumber(...values){
  for(const v of values){
    if(v !== null && v !== undefined && !Number.isNaN(Number(v))) return Number(v);
  }
  return null;
}
function safeText(v, fallback = "Weather"){ return String(v || fallback).trim() || fallback; }
function cleanPop(v){ return clamp(round(v === null || v === undefined ? 0 : v), 0, 100); }
function popValue(period){
  return cleanPop(period && period.probabilityOfPrecipitation ? period.probabilityOfPrecipitation.value : 0);
}
function degToCardinal(deg){
  if(deg === null || deg === undefined || Number.isNaN(Number(deg))) return "";
  const dirs = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
  return dirs[Math.round(Number(deg) / 22.5) % 16];
}
function formatWindObservation(p){
  const speed = mpsToMph(val(p.windSpeed));
  const gust = mpsToMph(val(p.windGust));
  const dir = degToCardinal(val(p.windDirection));
  if(speed === null) return null;
  const base = `${dir ? dir + " " : ""}${round(speed)} mph`;
  return gust !== null && round(gust) > round(speed) ? `${base} G ${round(gust)}` : base;
}

const dateParts = new Intl.DateTimeFormat("en-US", {
  timeZone: CONFIG.timezone,
  year: "numeric",
  month: "2-digit",
  day: "2-digit"
});

function localDateKey(iso){
  const parts = dateParts.formatToParts(new Date(iso));
  const y = parts.find(p => p.type === "year").value;
  const m = parts.find(p => p.type === "month").value;
  const d = parts.find(p => p.type === "day").value;
  return `${y}-${m}-${d}`;
}

function todayKey(){
  return localDateKey(new Date().toISOString());
}

function addDaysToKey(key, offset){
  const [y, m, d] = key.split("-").map(Number);
  const date = new Date(Date.UTC(y, m - 1, d + offset));
  return `${date.getUTCFullYear()}-${pad2(date.getUTCMonth() + 1)}-${pad2(date.getUTCDate())}`;
}

function dayLabelFromKey(key, idx){
  if(idx === 0) return "Today";
  const [y, m, d] = key.split("-").map(Number);
  const date = new Date(Date.UTC(y, m - 1, d));
  return date.toLocaleDateString(undefined, { weekday: "short", timeZone: "UTC" });
}

function formatTime(iso = new Date().toISOString()){
  return new Intl.DateTimeFormat("en-US", {
    timeZone: CONFIG.timezone,
    hour: "numeric",
    minute: "2-digit"
  }).format(new Date(iso));
}

function shortLabel(iso){
  const parts = new Intl.DateTimeFormat("en-US", {
    timeZone: CONFIG.timezone,
    hour: "numeric",
    hour12: true
  }).formatToParts(new Date(iso));
  const hour = parts.find(p => p.type === "hour").value;
  const period = parts.find(p => p.type === "dayPeriod").value.charAt(0);
  return hour + period;
}

function textToCode(text){
  const s = String(text || "").toLowerCase();
  if(/thunder|t-?storm|storm/.test(s)) return 95;
  if(/snow|sleet|wintry|ice|freezing/.test(s)) return 71;
  if(/showers|rain|drizzle/.test(s)) return 61;
  if(/fog|mist|haze|smoke/.test(s)) return 45;
  if(/overcast|cloudy/.test(s) && !/partly|mostly clear|few/.test(s)) return 3;
  if(/partly|few|scattered|mostly sunny|mostly clear|partly sunny/.test(s)) return 2;
  if(/clear|sunny|fair/.test(s)) return 0;
  return 2;
}

function normalizeCondition(text){
  const t = safeText(text, "Weather");
  if(t.toLowerCase() === "fair") return "Clear";
  return t;
}

function iconSVG(code, isDay = true, size = 24){
  const sun = "#ffd05d";
  const rain = "#68ddff";
  const cloud = "#eaf3ff";
  const cloud2 = "#cfe0f7";
  const moon = "#c8d8f3";

  const gSun = `
    <g>
      <circle cx="24" cy="24" r="8.6" fill="${sun}"></circle>
      <g stroke="${sun}" stroke-width="2" stroke-linecap="round">
        <path d="M24 6v5"></path>
        <path d="M24 37v5"></path>
        <path d="M6 24h5"></path>
        <path d="M37 24h5"></path>
        <path d="M11.3 11.3l3.8 3.8"></path>
        <path d="M36.7 11.3l-3.8 3.8"></path>
        <path d="M15.1 32.9l-3.8 3.8"></path>
        <path d="M32.9 32.9l3.8 3.8"></path>
      </g>
    </g>
  `;

  const gMoon = `
    <g>
      <path d="M30.5 10.2c-1.5-.6-3.1-.9-4.8-.9-7.4 0-13.4 6-13.4 13.4s6 13.4 13.4 13.4c4.9 0 9.2-2.6 11.6-6.6-7 .9-13.3-4.1-14.2-11.1-.5-3.7.7-7.1 3-9.7 1.3.1 2.9.6 4.4 1.5z" fill="${moon}"></path>
    </g>
  `;

  const gCloud = `
    <g>
      <ellipse cx="22" cy="28" rx="9.8" ry="7" fill="${cloud}"></ellipse>
      <ellipse cx="31" cy="27" rx="8.2" ry="6.1" fill="${cloud2}"></ellipse>
      <ellipse cx="16" cy="30" rx="6.3" ry="5" fill="${cloud2}"></ellipse>
      <rect x="13" y="27" width="24" height="8" rx="4" fill="${cloud}"></rect>
    </g>
  `;

  const gRain = `
    <g stroke="${rain}" stroke-width="2.2" stroke-linecap="round">
      <path d="M17 37l-2.8 5.4"></path>
      <path d="M24 37l-2.8 5.4"></path>
      <path d="M31 37l-2.8 5.4"></path>
    </g>
  `;

  const gStorm = `
    <g>
      <path d="M23 34h6l-4 6h4l-8 8 2-8h-4z" fill="${sun}"></path>
    </g>
  `;

  let inner = "";
  if([0,1].includes(code)) inner = isDay ? gSun : gMoon;
  else if(code === 2) inner = (isDay ? gSun : gMoon) + gCloud;
  else if([3,45,48].includes(code)) inner = gCloud;
  else if([51,53,55,61,63,65,80,81,82].includes(code)) inner = gCloud + gRain;
  else if([95,96,99].includes(code)) inner = gCloud + gStorm;
  else inner = gCloud;

  return `<svg viewBox="0 0 48 48" width="${size}" height="${size}" aria-hidden="true">${inner}</svg>`;
}

function bezierPath(points){
  if(!points.length) return "";
  let d = `M ${points[0].x} ${points[0].y}`;
  for(let i = 1; i < points.length; i++){
    const p = points[i - 1];
    const c = points[i];
    const mx = (p.x + c.x) / 2;
    d += ` C ${mx} ${p.y}, ${mx} ${c.y}, ${c.x} ${c.y}`;
  }
  return d;
}

function updateBannerScroll(){
  const viewport = document.getElementById("bannerViewport");
  const text = document.getElementById("bannerText");
  if(!viewport || !text) return;

  text.classList.remove("scroll");
  text.style.removeProperty("--scroll-distance");
  text.style.removeProperty("animation-duration");

  const viewportWidth = viewport.clientWidth;
  const textWidth = text.scrollWidth;

  if(textWidth > viewportWidth){
    const gap = 40;
    const distance = textWidth + gap;
    const duration = Math.max(8, distance / 28);
    text.style.setProperty("--scroll-distance", distance + "px");
    text.style.animationDuration = duration + "s";
    text.classList.add("scroll");
  }
}

function setBanner(rains, currentText, alerts){
  const maxRain = Math.max(0, ...rains.map(cleanPop));
  const dot = document.getElementById("dot");
  const text = document.getElementById("bannerText");
  const conditionCode = textToCode(currentText);

  if(alerts && alerts.length){
    const first = alerts[0].properties || {};
    dot.style.background = "var(--yellow)";
    dot.style.boxShadow = "0 0 10px rgba(255,208,93,.6)";
    text.textContent = safeText(first.event, "Weather alert") + " in effect";
  }else if([95,96,99].includes(conditionCode) || maxRain >= 70){
    dot.style.background = "var(--red)";
    dot.style.boxShadow = "0 0 10px rgba(255,125,125,.6)";
    text.textContent = "High rain or storm potential in the next 24 hours";
  }else if(maxRain >= 35){
    dot.style.background = "var(--yellow)";
    dot.style.boxShadow = "0 0 10px rgba(255,208,93,.6)";
    text.textContent = "Rain possible in the next 24 hours";
  }else{
    dot.style.background = "var(--green)";
    dot.style.boxShadow = "0 0 10px rgba(69,229,154,.6)";
    text.textContent = "No significant Weather.gov alerts for this location";
  }

  requestAnimationFrame(updateBannerScroll);
}

function renderChart(hours, temps, rains){
  const svg = document.getElementById("chart");
  const labels = document.getElementById("chartLabels");
  svg.innerHTML = "";
  labels.innerHTML = "";

  const W = 470;
  const H = 106;
  const left = 10;
  const right = 10;
  const top = 8;
  const innerW = W - left - right;
  const tempBottom = 60;
  const rainBase = 82;
  const rainMaxH = 14;

  while(hours.length < 24){
    const lastTime = hours.length ? new Date(hours[hours.length - 1]).getTime() : Date.now();
    hours.push(new Date(lastTime + 60 * 60 * 1000).toISOString());
    temps.push(temps.length ? temps[temps.length - 1] : 0);
    rains.push(0);
  }

  temps = temps.slice(0, 24).map(t => Number(t));
  rains = rains.slice(0, 24).map(cleanPop);
  hours = hours.slice(0, 24);

  const minT = Math.min(...temps);
  const maxT = Math.max(...temps);
  const spread = Math.max(6, maxT - minT);

  const defs = document.createElementNS(NS, "defs");
  defs.innerHTML = `
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#68ddff"></stop>
      <stop offset="100%" stop-color="#b6f4ff"></stop>
    </linearGradient>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(104,221,255,.25)"></stop>
      <stop offset="100%" stop-color="rgba(104,221,255,0)"></stop>
    </linearGradient>
  `;
  svg.appendChild(defs);

  for(let i = 0; i < 4; i++){
    const y = 16 + i * 16;
    const line = document.createElementNS(NS, "line");
    line.setAttribute("x1", left);
    line.setAttribute("x2", W - right);
    line.setAttribute("y1", y);
    line.setAttribute("y2", y);
    line.setAttribute("stroke", "rgba(182,244,255,.08)");
    line.setAttribute("stroke-width", "1");
    svg.appendChild(line);
  }

  for(let i = 0; i < 24; i += 3){
    const x = left + (innerW / 23) * i;
    const line = document.createElementNS(NS, "line");
    line.setAttribute("x1", x);
    line.setAttribute("x2", x);
    line.setAttribute("y1", 0);
    line.setAttribute("y2", H);
    line.setAttribute("stroke", "rgba(182,244,255,.06)");
    line.setAttribute("stroke-width", "1");
    svg.appendChild(line);
  }

  const points = temps.map((t, i) => {
    const x = left + (innerW / 23) * i;
    const y = top + ((maxT - t) / spread) * (tempBottom - top);
    return {x, y};
  });

  const area = document.createElementNS(NS, "path");
  area.setAttribute("d", bezierPath(points) + ` L ${points[points.length - 1].x} ${tempBottom + 6} L ${points[0].x} ${tempBottom + 6} Z`);
  area.setAttribute("fill", "url(#areaGrad)");
  svg.appendChild(area);

  const glow = document.createElementNS(NS, "path");
  glow.setAttribute("d", bezierPath(points));
  glow.setAttribute("fill", "none");
  glow.setAttribute("stroke", "rgba(104,221,255,.26)");
  glow.setAttribute("stroke-width", "6");
  glow.setAttribute("stroke-linecap", "round");
  glow.setAttribute("stroke-linejoin", "round");
  svg.appendChild(glow);

  const line = document.createElementNS(NS, "path");
  line.setAttribute("d", bezierPath(points));
  line.setAttribute("fill", "none");
  line.setAttribute("stroke", "url(#lineGrad)");
  line.setAttribute("stroke-width", "2.5");
  line.setAttribute("stroke-linecap", "round");
  line.setAttribute("stroke-linejoin", "round");
  svg.appendChild(line);

  for(let i = 0; i < 24; i++){
    const x = left + (innerW / 23) * i;
    const barH = clamp(rains[i], 0, 100) / 100 * rainMaxH;

    const bar = document.createElementNS(NS, "rect");
    bar.setAttribute("x", x - 3.5);
    bar.setAttribute("y", rainBase - barH);
    bar.setAttribute("width", 7);
    bar.setAttribute("height", barH);
    bar.setAttribute("rx", 2.5);
    bar.setAttribute("fill", "rgba(54,207,255,.95)");
    svg.appendChild(bar);

    const dot = document.createElementNS(NS, "circle");
    dot.setAttribute("cx", x);
    dot.setAttribute("cy", points[i].y);
    dot.setAttribute("r", i === 0 ? 3.2 : 2.3);
    dot.setAttribute("fill", "#ffffff");
    dot.setAttribute("stroke", "#68ddff");
    dot.setAttribute("stroke-width", "1.2");
    svg.appendChild(dot);

    if(i % 3 === 0){
      const tt = document.createElementNS(NS, "text");
      tt.setAttribute("x", x);
      tt.setAttribute("y", Math.max(10, points[i].y - 6));
      tt.setAttribute("text-anchor", "middle");
      tt.setAttribute("fill", "#f2f6fb");
      tt.setAttribute("font-size", "9");
      tt.setAttribute("font-weight", "700");
      tt.textContent = round(temps[i]) + "°";
      svg.appendChild(tt);

      const rt = document.createElementNS(NS, "text");
      rt.setAttribute("x", x);
      rt.setAttribute("y", "84");
      rt.setAttribute("text-anchor", "middle");
      rt.setAttribute("fill", "#f2f6fb");
      rt.setAttribute("font-size", "12");
      rt.setAttribute("font-weight", "800");
      rt.textContent = round(rains[i]) + "%";
      svg.appendChild(rt);

      const label = document.createElement("div");
      label.className = "chartLabel";
      label.textContent = i === 0 ? "Now" : shortLabel(hours[i]);
      labels.appendChild(label);
    }
  }
}

function renderDays(days){
  const grid = document.getElementById("daysGrid");
  grid.innerHTML = "";

  for(let i = 0; i < 5; i++){
    const day = days[i] || {};
    const text = safeText(day.text, "Weather");
    const card = document.createElement("div");
    card.className = "dayCard";
    card.innerHTML = `
      <div class="dayName">${dayLabelFromKey(day.key, i)}</div>
      <div class="dayIcon" title="${text.replace(/"/g, "&quot;")}">${iconSVG(textToCode(text), true, 16)}</div>
      <div class="dayTemps">
        <div class="high">${day.high === null || day.high === undefined ? "--" : round(day.high) + "°"}</div>
        <div class="low">${day.low === null || day.low === undefined ? "--" : round(day.low) + "°"}</div>
      </div>
      <div class="rainRow">
        <div class="rainTrack"><div class="rainFill" style="width:${cleanPop(day.pop)}%"></div></div>
        <div class="rainPct">${cleanPop(day.pop)}%</div>
      </div>
    `;
    grid.appendChild(card);
  }
}

async function fetchJson(url){
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 12000);
  try{
    const res = await fetch(url, {
      cache: "no-store",
      signal: controller.signal,
      headers: {"Accept": "application/geo+json, application/json"}
    });
    if(!res.ok) throw new Error(`${res.status} ${url}`);
    return await res.json();
  }finally{
    clearTimeout(timer);
  }
}

function stationId(feature){
  const p = feature && feature.properties ? feature.properties : {};
  const id = p.stationIdentifier || p.stationId || p.stationID || feature.id || "";
  return String(id).split("/").pop();
}

function sortStations(features){
  const preferred = CONFIG.preferredStations;
  return [...features].sort((a, b) => {
    const ai = preferred.indexOf(stationId(a));
    const bi = preferred.indexOf(stationId(b));
    const av = ai === -1 ? 999 : ai;
    const bv = bi === -1 ? 999 : bi;
    return av - bv;
  });
}

async function readStationObservation(stationId, stationName){
  const obs = await fetchJson(`${CONFIG.apiBase}/stations/${stationId}/observations/latest?require_qc=false`);
  const p = obs.properties || {};
  const temp = cToF(val(p.temperature));
  if(temp === null || Number.isNaN(temp)) return null;
  return {
    stationId,
    name: stationName || stationId,
    timestamp: p.timestamp,
    text: normalizeCondition(p.textDescription),
    temperature: temp,
    feels: firstNumber(cToF(val(p.heatIndex)), cToF(val(p.windChill)), temp),
    humidity: val(p.relativeHumidity),
    wind: mpsToMph(val(p.windSpeed)),
    windText: formatWindObservation(p)
  };
}

async function loadObservation(stationsUrl){
  // Use the same station Weather.gov shows for the comparison page, then fall back to nearby stations.
  if(CONFIG.currentStation){
    try{
      const direct = await readStationObservation(CONFIG.currentStation, "Fort Lauderdale/Hollywood International Airport");
      if(direct) return direct;
    }catch(e){}
  }

  try{
    const data = await fetchJson(stationsUrl);
    const stations = sortStations(data.features || []).slice(0, 8);

    for(const station of stations){
      const id = stationId(station);
      if(!id) continue;
      try{
        const stationName = station.properties && station.properties.name ? station.properties.name : id;
        const obs = await readStationObservation(id, stationName);
        if(obs) return obs;
      }catch(e){
        continue;
      }
    }
  }catch(e){
    return null;
  }
  return null;
}

async function loadAlerts(){
  try{
    const url = `${CONFIG.apiBase}/alerts/active?point=${CONFIG.latitude},${CONFIG.longitude}`;
    const data = await fetchJson(url);
    return data.features || [];
  }catch(e){
    return [];
  }
}

function firstCurrentHourly(hourlyPeriods){
  const now = Date.now();
  const idx = hourlyPeriods.findIndex(p => new Date(p.endTime).getTime() > now);
  return hourlyPeriods.slice(Math.max(0, idx), Math.max(0, idx) + 24);
}

function makeDaily(hourlyPeriods, forecastPeriods){
  const startKey = todayKey();
  const byDay = new Map();

  function ensure(key){
    if(!byDay.has(key)){
      byDay.set(key, {key, high:null, low:null, pop:0, text:"", dayText:"", nightText:""});
    }
    return byDay.get(key);
  }

  // Match the visible Weather.gov forecast cards: one daytime period plus the following nighttime period.
  // High/low and rain percentage are taken from the 12-hour text forecast, not recomputed from hourly data.
  for(const p of forecastPeriods || []){
    const key = localDateKey(p.startTime);
    const d = ensure(key);
    const temp = Number(p.temperature);
    const pop = popValue(p);

    if(p.isDaytime){
      d.high = Number.isNaN(temp) ? d.high : temp;
      d.pop = pop;
      d.dayText = p.shortForecast || p.name || "";
      d.text = d.dayText || d.text;
    }else{
      d.low = Number.isNaN(temp) ? d.low : temp;
      d.nightText = p.shortForecast || p.name || "";
      if(!d.text) d.text = d.nightText;
    }
  }

  // Fill any missing high/low only when the 12-hour forecast does not provide it.
  for(const p of hourlyPeriods || []){
    const key = localDateKey(p.startTime);
    const d = ensure(key);
    const temp = Number(p.temperature);
    if(!Number.isNaN(temp)){
      if(d.high === null) d.high = temp;
      if(d.low === null) d.low = temp;
      d.high = Math.max(d.high, temp);
      d.low = Math.min(d.low, temp);
    }
    if(!d.text) d.text = p.shortForecast || "Weather";
  }

  const days = [];
  for(let i = 0; i < 5; i++){
    const key = addDaysToKey(startKey, i);
    const d = ensure(key);
    d.text = d.dayText || d.text || d.nightText || "Weather";
    days.push(d);
  }
  return days;
}

async function loadWeather(){
  const pointUrl = `${CONFIG.apiBase}/points/${CONFIG.latitude},${CONFIG.longitude}`;

  try{
    const point = await fetchJson(pointUrl);
    const props = point.properties || {};

    const [hourly, forecast, observation, alerts] = await Promise.all([
      fetchJson(props.forecastHourly),
      fetchJson(props.forecast),
      loadObservation(props.observationStations),
      loadAlerts()
    ]);

    const hourlyPeriods = firstCurrentHourly((hourly.properties && hourly.properties.periods) || []);
    const forecastPeriods = (forecast.properties && forecast.properties.periods) || [];
    const days = makeDaily((hourly.properties && hourly.properties.periods) || [], forecastPeriods);
    const currentHour = hourlyPeriods[0] || {};
    const currentText = normalizeCondition((observation && observation.text) || currentHour.shortForecast || "Weather");
    const currentCode = textToCode(currentText);
    const currentTemp = observation && observation.temperature !== null ? observation.temperature : currentHour.temperature;
    const currentFeels = observation && observation.feels !== null ? observation.feels : currentTemp;
    const humidity = observation && observation.humidity !== null && observation.humidity !== undefined ? round(observation.humidity) + "%" : "--";
    const wind = observation && observation.windText ? observation.windText : (observation && observation.wind !== null && observation.wind !== undefined ? round(observation.wind) + " mph" : safeText(currentHour.windSpeed, "--"));
    const activeForecastPeriod = forecastPeriods.find(p => new Date(p.endTime).getTime() > Date.now()) || forecastPeriods[0] || currentHour;
    const rainNow = popValue(activeForecastPeriod);

    const today = days[0] || {};
    const updatedAt = observation && observation.timestamp ? observation.timestamp : (forecast.properties && forecast.properties.updated) || new Date().toISOString();

    document.getElementById("updated").textContent = "Updated " + formatTime(updatedAt);
    document.getElementById("temp").textContent = round(currentTemp) + "°";
    document.getElementById("condition").textContent = currentText;
    document.getElementById("summary").textContent =
      `Feels ${round(currentFeels)}° • H ${today.high === null ? "--" : round(today.high) + "°"} • L ${today.low === null ? "--" : round(today.low) + "°"}`;
    document.getElementById("currentIcon").innerHTML = iconSVG(currentCode, currentHour.isDaytime !== false, 42);
    document.getElementById("rainNow").textContent = rainNow + "%";
    document.getElementById("humidity").textContent = humidity;
    document.getElementById("wind").textContent = wind;

    const hours24 = hourlyPeriods.map(p => p.startTime);
    const temps24 = hourlyPeriods.map(p => Number(p.temperature));
    const rains24 = hourlyPeriods.map(p => cleanPop(p.probabilityOfPrecipitation && p.probabilityOfPrecipitation.value));

    setBanner(rains24, currentText, alerts);
    renderChart(hours24, temps24, rains24);
    renderDays(days);

    document.getElementById("app").classList.remove("loading");
  }catch(e){
    document.getElementById("app").classList.remove("loading");
    document.getElementById("condition").textContent = "Weather.gov unavailable";
    document.getElementById("summary").textContent = "Will retry automatically";
    document.getElementById("updated").textContent = "Retrying soon";
    document.getElementById("bannerText").textContent = "Weather.gov data connection issue. Retrying automatically.";
    requestAnimationFrame(updateBannerScroll);
  }
}

window.addEventListener("resize", updateBannerScroll);

loadWeather();
setInterval(loadWeather, CONFIG.refreshMs);
</script>
