<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lvenow</title>

  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    .video-wrap {
      width: 100%;
      height: 100vh;
    }

    #player {
      width: 100%;
      height: 100%;
    }

    .video-js .vjs-big-play-button {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="video-wrap">
    <video
      id="player"
      class="video-js vjs-default-skin vjs-fill"
      preload="auto"
      autoplay
      muted
      playsinline
      webkit-playsinline
      controls
    >
      <source
        src="https://fox-foxnewsnow-vizio.amagi.tv/playlist.m3u8"
        type="application/x-mpegURL"
      />
      Your browser does not support HTML5 video.
    </video>
  </div>

  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
  <script>
    const STREAM_URL = 'https://fox-foxnewsnow-vizio.amagi.tv/playlist.m3u8';
    const REFRESH_INTERVAL_MINUTES = 52;

    const player = videojs('player', {
      fluid: false,
      fill: true,
      autoplay: 'muted',
      muted: true,
      controls: true,
      liveui: true,
      preferFullWindow: true,
      bigPlayButton: false,
      responsive: true,
      controlBar: {
        volumePanel: { inline: false },
        currentTimeDisplay: false,
        timeDivider: false,
        durationDisplay: false,
        remainingTimeDisplay: false,
        pictureInPictureToggle: false
      },
      html5: {
        vhs: {
          enableLowInitialPlaylist: true,
          smoothQualityChange: true,
          overrideNative: true
        },
        nativeAudioTracks: false,
        nativeVideoTracks: false
      }
    });

    function tryAutoplay() {
      const playPromise = player.play();

      if (playPromise && typeof playPromise.then === 'function') {
        playPromise.catch(() => {
          player.muted(true);
          const retry = player.play();
          if (retry && typeof retry.catch === 'function') {
            retry.catch(() => {});
          }
        });
      }
    }

    function refreshStream() {
      player.pause();

      player.src({
        src: STREAM_URL,
        type: 'application/x-mpegURL'
      });

      player.load();

      player.one('loadedmetadata', () => {
        tryAutoplay();
      });
    }

    player.ready(() => {
      player.muted(true);

      player.one('loadedmetadata', tryAutoplay);
      player.one('canplay', tryAutoplay);

      setTimeout(tryAutoplay, 250);
    });

    // Auto refresh every X minutes
    setInterval(() => {
      refreshStream();
    }, REFRESH_INTERVAL_MINUTES * 60 * 1000);

    // Optional: refresh if stream stalls
    let stallTimeout = null;

    player.on('waiting', () => {
      if (stallTimeout) return;

      stallTimeout = setTimeout(() => {
        if (player.paused() || player.readyState() < 2) {
          refreshStream();
        }
        stallTimeout = null;
      }, 5000);
    });

    player.on('playing', () => {
      if (stallTimeout) {
        clearTimeout(stallTimeout);
        stallTimeout = null;
      }
    });

    // Error recovery
    player.on('error', () => {
      setTimeout(() => {
        refreshStream();
      }, 2000);
    });

    // Resume if tab becomes active again
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && player.paused()) {
        tryAutoplay();
      }
    });
  </script>
</body>
</html>
