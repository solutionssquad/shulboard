<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveNOW Test via Tubi</title>

  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    .video-wrap {
      width: 100%;
      height: 100vh;
      background: #000;
    }

    #player {
      width: 100%;
      height: 100%;
    }

    .video-js .vjs-big-play-button {
      display: none !important;
    }

    #status {
      position: fixed;
      right: 8px;
      bottom: 8px;
      z-index: 9999;
      color: rgba(255,255,255,0.6);
      font: 12px Arial, sans-serif;
      background: rgba(0,0,0,0.35);
      padding: 4px 6px;
      border-radius: 4px;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="video-wrap">
    <video
      id="player"
      class="video-js vjs-default-skin vjs-fill"
      preload="auto"
      autoplay
      muted
      playsinline
      webkit-playsinline
      controls
    ></video>
  </div>

  <div id="status">loading…</div>

  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
  <script>
    const STREAM_URL = 'https://live-manifest.production-public.tubi.io/live/8127bb63-a43e-4859-8681-7c1ad6192796/playlist.m3u8?token=eyJhbGciOiJIUzUxMiIsInR5cCI6IkpXVCJ9.eyJjb3VudHJ5IjoiVVMiLCJkZXZpY2VfaWQiOiI1NjUwZjdmOC0zZjZiLTRiMWQtYTVmZC1hZjNkMjVjMjc5YmYiLCJleHAiOjE3NzQ1MzY2NDksImlzcyI6ImxpdmVfbmV3c19tYW5pZmVzdCIsInBsYXRmb3JtIjoiV0VCIiwicnNzIjoiYXA6bGl2ZW5vdy1mcm9tLWZveC1WODNqSGgiLCJ1c2VyX2lkIjowfQ.swsU4j_Oc3RvKmCdJEg8QA9wmmLVXV3CrEy5axq3TrbrTN9ZRB6KuUrql4ROBrSYTNcOLEo-qgD4vLAhiuv3KA&tb.sid=a64b1204-19b9-491b-ad16-26dee32ce894';

    const statusEl = document.getElementById('status');

    const player = videojs('player', {
      fluid: false,
      fill: true,
      autoplay: 'muted',
      muted: true,
      controls: true,
      liveui: true,
      responsive: true,
      bigPlayButton: false,
      controlBar: {
        volumePanel: { inline: false },
        currentTimeDisplay: false,
        timeDivider: false,
        durationDisplay: false,
        remainingTimeDisplay: false,
        pictureInPictureToggle: false
      },
      html5: {
        vhs: {
          overrideNative: true,
          enableLowInitialPlaylist: true,
          smoothQualityChange: true
        },
        nativeAudioTracks: false,
        nativeVideoTracks: false
      }
    });

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function tryAutoplay() {
      const p = player.play();
      if (p && typeof p.then === 'function') {
        p.catch(() => {
          player.muted(true);
          const retry = player.play();
          if (retry && typeof retry.catch === 'function') {
            retry.catch(() => {});
          }
        });
      }
    }

    function loadStream() {
      setStatus('loading…');

      player.src({
        src: STREAM_URL,
        type: 'application/x-mpegURL'
      });

      player.ready(() => {
        player.muted(true);
        player.load();
        player.one('loadedmetadata', tryAutoplay);
        player.one('canplay', tryAutoplay);
        setTimeout(tryAutoplay, 250);
      });
    }

    player.on('playing', () => {
      setStatus('live');
    });

    player.on('waiting', () => {
      setStatus('buffering…');
    });

    player.on('error', () => {
      const err = player.error();
      setStatus('error');
      console.error('Video.js error:', err);
    });

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        tryAutoplay();
      }
    });

    loadStream();
  </script>
</body>
</html>
