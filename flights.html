<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Flights v3</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <style>
    :root {
      --yellow: #ffd21f;
      --green: #31d878;
      --red: #ff596d;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      overflow: hidden;
      background: #030406;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    #app, #map {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    #map {
      z-index: 1;
      background: #050608;
    }

    /*
      MAP DARKNESS
      This darkens only the map tiles, not aircraft icons, labels, or status chips.
      To make the map darker, reduce brightness below .42. To make it lighter, increase it.
    */
    .leaflet-tile {
      /* Dark, high-contrast satellite look. Increase brightness if too dark. */
      filter: saturate(.92) brightness(.34) contrast(1.28);
      will-change: transform;
    }

    .leaflet-control-container {
      display: none;
    }

    /*
      AIRCRAFT MOVEMENT SMOOTHING
      Leaflet jumps markers to each new API location. This CSS transition smooths that jump.
      Match the transition duration roughly to UPDATE_MS. Too long can make planes feel delayed.
    */
    .leaflet-marker-icon {
      transition: transform 1.15s linear !important;
      will-change: transform;
    }

    .leaflet-overlay-pane svg path {
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: none;
    }

    /* Subtle texture overlay. It sits over tiles but below aircraft and labels. */
    #texture {
      position: absolute;
      inset: 0;
      z-index: 455;
      pointer-events: none;
      opacity: .13;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.35) 0 1px, transparent 1px),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,.24) 0 1px, transparent 1px);
      background-size: 28px 28px, 34px 34px;
      mix-blend-mode: screen;
    }

    .topchips {
      position: absolute;
      top: 7px;
      right: 8px;
      z-index: 900;
      display: flex;
      gap: 5px;
      align-items: center;
      pointer-events: none;
    }

    .chip {
      height: 24px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.13);
      background: rgba(5,7,10,.66);
      backdrop-filter: blur(4px);
      font-family: var(--mono);
      font-size: 10px;
      color: rgba(255,255,255,.9);
      box-shadow: 0 8px 18px rgba(0,0,0,.28);
      white-space: nowrap;
    }

    .chip.polished {
      animation: chipBreath 4.5s ease-in-out infinite;
    }

    @keyframes chipBreath {
      0%, 100% { box-shadow: 0 6px 16px rgba(0,0,0,.18); }
      50% { box-shadow: 0 6px 18px rgba(255,210,31,.12); }
    }

    .live-led {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
    }

    .chip.warn .live-led { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
    .chip.bad .live-led { background: var(--red); box-shadow: 0 0 8px var(--red); }

    .plane-wrap {
      width: 36px;
      height: 36px;
      transform-origin: 50% 50%;
      filter:
        drop-shadow(0 4px 5px rgba(0,0,0,.9))
        drop-shadow(0 0 8px var(--planeGlow, rgba(255,210,31,.6)));
      transition: opacity .25s ease, filter .25s ease;
    }

    .plane-wrap.nearest {
      animation: nearestPulse 2.2s ease-in-out infinite;
    }

    .plane-wrap.emergency {
      animation: emergencyPulse .9s ease-in-out infinite;
    }

    @keyframes nearestPulse {
      0%, 100% { filter: drop-shadow(0 3px 4px rgba(0,0,0,.82)) drop-shadow(0 0 5px var(--planeGlow, rgba(255,210,31,.38))); }
      50% { filter: drop-shadow(0 3px 5px rgba(0,0,0,.85)) drop-shadow(0 0 11px var(--planeGlow, rgba(255,210,31,.72))); }
    }

    @keyframes emergencyPulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 3px 4px rgba(0,0,0,.82)) drop-shadow(0 0 6px rgba(255,0,0,.65)); }
      50% { transform: scale(1.18); filter: drop-shadow(0 3px 5px rgba(0,0,0,.9)) drop-shadow(0 0 14px rgba(255,0,0,.95)); }
    }

    .plane-wrap.stale {
      opacity: .36;
    }

    .plane-svg {
      display: block;
      width: 36px;
      height: 36px;
    }

    .labels {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 780;
    }

    .label {
      position: absolute;
      transform: translate3d(0,0,0);
      will-change: transform;
      min-width: 156px;
      max-width: 220px;
      padding: 8px 9px;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 13px;
      background: linear-gradient(180deg, rgba(11,14,18,.84), rgba(3,5,8,.72));
      box-shadow:
        0 12px 26px rgba(0,0,0,.52),
        0 0 0 1px rgba(255,210,31,.09),
        0 0 22px rgba(255,210,31,.15);
      backdrop-filter: blur(4px);
      display: none;
      opacity: 0;
      transition: opacity .28s ease;
    }

    .label.visible {
      opacity: .97;
    }

    .label.emergency {
      border-color: rgba(255,89,109,.55);
      box-shadow: 0 7px 18px rgba(255,0,0,.22);
    }

    .label-top {
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr) auto;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .mini-logo-slot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: rgba(255,255,255,.9);
      box-shadow: 0 0 10px rgba(255,255,255,.10);
    }

    .mini-logo-slot img {
      width: 24px;
      height: 24px;
      object-fit: contain;
      display: none;
    }

    .mini-fallback {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(255,210,31,.42), rgba(255,255,255,.12));
      color: #fff;
      font-family: var(--mono);
      font-size: 8px;
      font-weight: 900;
      letter-spacing: -.3px;
    }

    .label-call {
      color: var(--yellow);
      font-weight: 950;
      font-size: 15px;
      letter-spacing: .15px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-shadow: 0 0 10px rgba(255,210,31,.20);
    }

    .label-state {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 900;
      color: rgba(255,255,255,.82);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      padding: 2px 5px;
      background: rgba(255,255,255,.06);
    }

    .label-metrics {
      display: grid;
      grid-template-columns: repeat(3, auto);
      gap: 9px;
      margin-top: 7px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 800;
      color: rgba(255,255,255,.88);
    }

    .label-metrics span {
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="map"></div>
    <div id="texture"></div>
    <div id="labels" class="labels"></div>

    <div class="topchips">
      <div class="chip" id="liveChip"><span class="live-led"></span><span id="liveText">START</span></div>
      <div class="chip"><span>AC</span><strong id="countText">0</strong></div>
      <div class="chip"><span>AGE</span><strong id="ageText">n/a</strong></div>
    </div>
  </div>

  <script>
    /***********************************************************************
     * USER SETTINGS
     * Edit this section first. These values control the map position,
     * data radius, refresh speed, label behavior, and API enrichment.
     **********************************************************************/

    // Starting map center. Use your exact display location or airport-adjacent point.
    const MAP_CENTER_LAT = 26.0702;
    const MAP_CENTER_LON = -80.1850;

    // Initial Leaflet zoom. Higher = closer in. Good kiosk range is usually 13 to 15. Def 14
    const MAP_ZOOM = 13;

    // Aircraft search center. Usually keep this equal to the map center.
    const FETCH_LAT = MAP_CENTER_LAT;
    const FETCH_LON = MAP_CENTER_LON;

    // Search radius in nautical miles. Larger radius shows more planes but increases visual clutter.
    const SEARCH_RADIUS_NM = 2.5;

    // PERFORMANCE MODE
    // true = only render the closest aircraft. This is best for Raspberry Pi signage.
    // false = render all aircraft returned by the API within the search radius.
    const NEAREST_AIRCRAFT_ONLY = false;

    // When NEAREST_AIRCRAFT_ONLY is false, this caps how many aircraft are rendered.
    // Lower values improve Raspberry Pi performance.
    const MAX_RENDERED_AIRCRAFT = 20;

    // ALTITUDE FILTER
    // Set to true to hide aircraft outside the altitude range below.
    const ENABLE_ALTITUDE_FILTER = true;

    // Altitude range in feet. Only used when ENABLE_ALTITUDE_FILTER is true.
    const MIN_AIRCRAFT_ALT_FT = 0;
    const MAX_AIRCRAFT_ALT_FT = 2000;

    // LOCAL AIRLINE LOGOS
    // Put logo PNG/SVG files next to this HTML file in a folder named "airline-logos".
    // Example file names: DAL.png, AAL.png, UAL.png, JBU.png, SWA.png, FFT.png
    // When a local logo is missing, the display falls back to the airline code letters.
    const USE_LOCAL_AIRLINE_LOGOS = true;
    const LOCAL_AIRLINE_LOGO_DIR = "airline-logos";
    const LOCAL_AIRLINE_LOGO_EXT = "png";

    /***********************************************************************
     * VISUAL EFFECT SETTINGS
     * These are designed to look better while staying Raspberry Pi friendly.
     **********************************************************************/

    // Aircraft glow intensity. Increase for more dramatic icons, lower for better performance.
    const ENABLE_PLANE_GLOW = true;

    // Pulse the nearest aircraft very subtly.
    const ENABLE_NEAREST_AIRCRAFT_HALO = true;

    // Use segmented fading trails instead of one flat polyline.
    const ENABLE_FADING_TRAILS = true;

    // Scale aircraft by altitude for a subtle depth effect.
    const ENABLE_ALTITUDE_SCALE = true;

    // Fade labels in/out instead of hard popping.
    const ENABLE_LABEL_FADE = true;

    // Add a very subtle texture over the map for a more cinematic look.
    const ENABLE_TEXTURE_OVERLAY = true;

    // Highlight emergency squawk codes 7700, 7600, and 7500.
    const ENABLE_EMERGENCY_HIGHLIGHT = true;

    // Slight chip breathing animation.
    const ENABLE_IDLE_UI_POLISH = true;

    // Main aircraft API refresh rate in milliseconds. Lower is more live but harder on Raspberry Pi.
    const UPDATE_MS = 1150;

    // Fetch timeout in milliseconds. If the API is slow, the tick is abandoned instead of hanging.
    const FETCH_TIMEOUT_MS = 1000;

    // Remove an aircraft after this many milliseconds without seeing it in the API response.
    const STALE_AIRCRAFT_MS = 32000;

    // Maximum number of aircraft labels shown at one time.
    const MAX_LABELED_AIRCRAFT = 8;

    // Only label planes within this many statute miles from the center.
    const LABEL_MAX_DISTANCE_MI = 2.5;

    // Only label planes below this altitude in feet. Set very high if you want cruise traffic labeled.
    const LABEL_ONLY_BELOW_FT = 2000;

    // Number of positions kept for trails. 6 points draws the last 5 update segments.
    const HISTORY_POINTS = 24;

    // Vertical speed thresholds. Positive = taking off/climbing, negative = landing/descending.
    const CLIMB_FPM_THRESHOLD = 500;
    const DESC_FPM_THRESHOLD = -500;

    // Aircraft below this altitude are treated as not airborne for label/display priority.
    const AIRBORNE_MIN_FT = 50;

    // Keeps labels inside the viewport and sets how far above the plane icon they sit.
    const LABEL_SCREEN_PADDING_PX = 7;
    const LABEL_OFFSET_Y_PX = 15;

    // ADSBDB adds aircraft type details. It is free, but extra API calls can slow weak hardware.
    const ADSBDB_ENABLE = true;

    // Cache durations for ADSBDB lookups.
    const ADSBDB_CALLSIGN_TTL_MS = 20 * 60 * 1000;
    const ADSBDB_HEX_TTL_MS = 24 * 60 * 60 * 1000;

    // Limits queued ADSBDB lookups so the Raspberry Pi does not get overloaded.
    const ADSBDB_MAX_QUEUE = 4;

    const labelsEl = document.getElementById("labels");
    const textureEl = document.getElementById("texture");
    const liveChip = document.getElementById("liveChip");
    const liveText = document.getElementById("liveText");
    const countText = document.getElementById("countText");
    const ageText = document.getElementById("ageText");

    // Apply optional visual polish settings immediately.
    if (!ENABLE_TEXTURE_OVERLAY && textureEl) textureEl.style.display = "none";
    if (ENABLE_IDLE_UI_POLISH) {
      document.querySelectorAll(".chip").forEach(el => el.classList.add("polished"));
    }

    const NM_TO_METERS = 1852;
    const MI_TO_METERS = 1609.344;
    const EARTH_M = 6371000;

    const state = { lastOkMs: null, lastStatus: "START", inFlight: false, rafPending: false };
    const aircraftState = new Map();
    const callsignCache = new Map();
    const hexCache = new Map();
    const pendingRouteKeys = new Set();
    const pendingHexKeys = new Set();
    const enrichQueue = [];
    let enrichBusy = false;

    function safeText(v) {
      if (v === null || v === undefined) return "n/a";
      const s = String(v).trim();
      return s.length ? s : "n/a";
    }

    function esc(v) {
      return safeText(v).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function toRad(d) { return d * Math.PI / 180; }

    function haversineMeters(lat1, lon1, lat2, lon2) {
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat/2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2) ** 2;
      return 2 * EARTH_M * Math.asin(Math.sqrt(a));
    }

    function fmtAltShort(feet) {
      if (typeof feet !== "number" || Number.isNaN(feet)) return "n/a";
      return feet >= 10000 ? `${Math.round(feet / 100) / 10}k` : `${Math.round(feet)}`;
    }

    function fmtSpeedShort(knots) {
      if (typeof knots !== "number" || Number.isNaN(knots)) return "n/a";
      return `${Math.round(knots)}`;
    }

    function fmtFpm(fpm) {
      if (typeof fpm !== "number" || Number.isNaN(fpm)) return null;
      return Math.round(fpm);
    }

    function fmtAge(ms) {
      if (!ms) return "n/a";
      const s = Math.max(0, Math.round((Date.now() - ms) / 1000));
      return s < 60 ? `${s}s` : `${Math.round(s / 60)}m`;
    }

    function pickLatLon(ac) {
      if (typeof ac.lat === "number" && typeof ac.lon === "number") return { lat: ac.lat, lon: ac.lon };
      if (ac.lastPosition && typeof ac.lastPosition.lat === "number" && typeof ac.lastPosition.lon === "number") return { lat: ac.lastPosition.lat, lon: ac.lastPosition.lon };
      if (typeof ac.rr_lat === "number" && typeof ac.rr_lon === "number") return { lat: ac.rr_lat, lon: ac.rr_lon };
      return null;
    }

    // Returns the first real numeric field. This avoids unit bugs and handles values like alt_baro: "ground".
    function firstNumber(...values) {
      for (const v of values) {
        if (typeof v === "number" && Number.isFinite(v)) return v;
      }
      return null;
    }

    // Returns altitude in FEET.
    // airplanes.live/readsb-style alt_baro and alt_geom are already feet.
    // The previous version treated them as meters, causing altitude to show about 3.28x too high.
    function aircraftAltFeet(ac) {
      return firstNumber(ac.alt_baro, ac.alt_geom, ac.alt);
    }

    // Returns ground speed in KNOTS. airplanes.live/readsb `gs` is already knots.
    function aircraftSpeedKt(ac) {
      return firstNumber(ac.gs, ac.ias, ac.tas, ac.spd, ac.speed);
    }

    // Returns vertical rate in FEET PER MINUTE. airplanes.live/readsb rates are already ft/min.
    function aircraftVrateFpm(ac) {
      return firstNumber(ac.baro_rate, ac.geom_rate, ac.rate);
    }

    function aircraftTrackDeg(ac) {
      return firstNumber(ac.track, ac.true_heading, ac.mag_heading, ac.hdg, ac.heading) ?? 0;
    }

    function climbStateFromFpm(fpm) {
      if (typeof fpm !== "number") return "level";
      if (fpm >= CLIMB_FPM_THRESHOLD) return "takeoff";
      if (fpm <= DESC_FPM_THRESHOLD) return "landing";
      return "level";
    }

    function motionColor(motion) {
      if (motion === "takeoff") return "#31d878";
      if (motion === "landing") return "#ff596d";
      return "#ffd21f";
    }

    // Returns an rgba glow color matching the aircraft state.
    function motionGlow(motion) {
      if (motion === "takeoff") return "rgba(49,216,120,.72)";
      if (motion === "landing") return "rgba(255,89,109,.72)";
      return "rgba(255,210,31,.62)";
    }

    // Larger icons for lower aircraft, smaller icons for high aircraft.
    function altitudeScale(altFt) {
      if (!ENABLE_ALTITUDE_SCALE || typeof altFt !== "number") return 1;
      if (altFt < 1000) return 1.18;
      if (altFt < 3000) return 1.11;
      if (altFt < 7000) return 1.04;
      if (altFt > 18000) return .86;
      if (altFt > 12000) return .92;
      return 1;
    }

    // Slightly lower opacity for high/cruising traffic so low local traffic stands out.
    function altitudeOpacity(altFt) {
      if (typeof altFt !== "number") return 1;
      if (altFt > 18000) return .62;
      if (altFt > 12000) return .78;
      return 1;
    }

    function isEmergencySquawk(ac) {
      if (!ENABLE_EMERGENCY_HIGHLIGHT) return false;
      const sq = safeText(ac && (ac.squawk ?? ac.sqk)).replace(/^0+/, "");
      return sq === "7700" || sq === "7600" || sq === "7500";
    }

    function stateText(s) { return s === "takeoff" ? "TKOF" : s === "landing" ? "LAND" : "LVL"; }
    function distanceMi(latLng) { return haversineMeters(FETCH_LAT, FETCH_LON, latLng.lat, latLng.lng) / MI_TO_METERS; }

    function airplanesLiveUrl() {
      return `https://api.airplanes.live/v2/point/${encodeURIComponent(FETCH_LAT)}/${encodeURIComponent(FETCH_LON)}/${encodeURIComponent(SEARCH_RADIUS_NM)}?t=${Date.now()}`;
    }

    function normalizeAircraftList(raw) {
      if (!raw) return [];
      if (Array.isArray(raw.ac)) return raw.ac;
      if (Array.isArray(raw.aircraft)) return raw.aircraft;
      if (Array.isArray(raw)) return raw;
      return [];
    }

    function isAirborne(ac, altFt) {
      if (ac && ac.on_ground === true) return false;
      return typeof altFt === "number" && altFt >= AIRBORNE_MIN_FT;
    }

    // Returns true when an aircraft passes the optional altitude filter.
    function passesAltitudeFilter(ac) {
      if (!ENABLE_ALTITUDE_FILTER) return true;
      const altFt = aircraftAltFeet(ac);
      if (typeof altFt !== "number") return false;
      return altFt >= MIN_AIRCRAFT_ALT_FT && altFt <= MAX_AIRCRAFT_ALT_FT;
    }

    function airlineCodeFromCallsign(callsign) {
      const cs = safeText(callsign).toUpperCase().replace(/\s+/g, "");
      const m = cs.match(/^([A-Z]{2,3})\d/);
      return m ? m[1] : cs.slice(0, 3);
    }

    // Airline logo URL builder.
    // Local logos are more reliable than hotlinked logo services, especially on Yodeck/Raspberry Pi.
    // Put files in: ./airline-logos/DAL.png, ./airline-logos/AAL.png, etc.
    function airlineLogoUrl(code) {
      const c = safeText(code).toUpperCase();
      if (c === "N/A" || c.length < 2) return "";
      if (USE_LOCAL_AIRLINE_LOGOS) {
        return `${LOCAL_AIRLINE_LOGO_DIR}/${encodeURIComponent(c)}.${LOCAL_AIRLINE_LOGO_EXT}`;
      }
      return `https://content.airhex.com/content/logos/airlines_${encodeURIComponent(c)}_50_50_s.png`;
    }

    function bestType(acPayload, aircraftInfo) {
      const fallback = safeText(acPayload.t || acPayload.type);
      if (!aircraftInfo) return fallback;
      const mt = aircraftInfo.manufacturer && aircraftInfo.manufacturer !== "n/a" ? aircraftInfo.manufacturer : "";
      const t = aircraftInfo.type && aircraftInfo.type !== "n/a" ? aircraftInfo.type : "";
      const it = aircraftInfo.icaoType && aircraftInfo.icaoType !== "n/a" ? aircraftInfo.icaoType : "";
      return [mt, t].filter(Boolean).join(" ") || it || fallback;
    }

    function aircraftClass(acPayload, aircraftInfo) {
      const t = safeText((aircraftInfo && aircraftInfo.icaoType) || acPayload.t || acPayload.type).toUpperCase();
      if (/^H|HELI|EC\d|R44|R66|B06/.test(t)) return "heli";
      if (/C17|C5|A4|BLCF|AN|IL|C130/.test(t)) return "heavy";
      if (/A3|A2|B7|B3|E1|E7|CRJ|MD|DC/.test(t)) return "jet";
      return "prop";
    }

    const map = L.map("map", {
      zoomControl: false,
      attributionControl: false,
      preferCanvas: true,
      fadeAnimation: false,
      markerZoomAnimation: false,
      zoomAnimation: false,
      inertia: false,
      dragging: false,
      touchZoom: false,
      scrollWheelZoom: false,
      doubleClickZoom: false,
      boxZoom: false,
      keyboard: false
    });

    L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
      maxZoom: 19,
      updateWhenIdle: true,
      updateWhenZooming: false,
      keepBuffer: 1,
      attribution: "Tiles &copy; Esri"
    }).addTo(map);

    map.setView([MAP_CENTER_LAT, MAP_CENTER_LON], MAP_ZOOM);

    L.circle([FETCH_LAT, FETCH_LON], {
      radius: SEARCH_RADIUS_NM * NM_TO_METERS,
      weight: 1,
      opacity: .24,
      color: "rgba(255,255,255,.72)",
      fillOpacity: .01,
      fillColor: "rgba(255,255,255,.18)"
    }).addTo(map);

    // Returns a simplified SVG path based on detected aircraft class.
    function planePath(kind) {
      if (kind === "heli") return '<path d="M31 22h2v8h12v4H33v8h-2v-8H19v-4h12zM18 16h28v3H18zM29 42h6l5 9H24z"/>';
      if (kind === "heavy") return '<path d="M30 3h4c2 0 3 1.5 3 3.4v17l20 10.5c1.5.8 2.1 2.6 1.3 4.1l-1.4 2.5c-.8 1.4-2.5 1.9-3.9 1.2L37 36v9l9 5.5c1 .6 1.4 1.9.8 3l-1 2c-.6 1.2-2 1.7-3.2 1.1L32 52l-10.6 4.6c-1.2.6-2.6.1-3.2-1.1l-1-2c-.6-1.1-.2-2.4.8-3l9-5.5v-9l-16 5.7c-1.4.7-3.1.2-3.9-1.2L5.7 38c-.8-1.5-.2-3.3 1.3-4.1L27 23.4v-17C27 4.5 28 3 30 3z"/>';
      if (kind === "prop") return '<path d="M30 5h4c1.6 0 2.7 1.2 2.7 2.8v17.5l17.2 10.4c1.3.8 1.8 2.4 1 3.7l-1.2 2c-.7 1.2-2.3 1.7-3.6 1L36.7 36v8.5l7.2 5.4c.9.7 1.2 2 .6 3l-1 1.7c-.6 1.1-2 1.5-3.1.9L32 51.3l-8.4 4.2c-1.1.6-2.5.2-3.1-.9l-1-1.7c-.6-1-.3-2.3.6-3l7.2-5.4V36l-13.4 7.4c-1.3.7-2.9.2-3.6-1l-1.2-2c-.8-1.3-.3-2.9 1-3.7l17.2-10.4V7.8C27.3 6.2 28.4 5 30 5zM25 16h14v3H25z"/>';
      return '<path d="M30 4c1.6 0 3.1 1.2 3.1 3.1v18.1l20.1 12.1c1.4.8 2 2.6 1.2 4l-1.5 2.6c-.8 1.4-2.6 1.9-4 1.1L33.1 36.1v9.1l8 6c1 .8 1.3 2.2.7 3.3l-1.2 2c-.7 1.2-2.2 1.6-3.5 1l-9-4.6-9 4.6c-1.3.6-2.8.2-3.5-1l-1.2-2c-.6-1.1-.3-2.5.7-3.3l8-6v-9.1L15.2 45.1c-1.4.8-3.2.3-4-1.1l-1.5-2.6c-.8-1.4-.2-3.2 1.2-4l20.1-12.1V7.1C31 5.2 32.5 4 30 4z"/>';
    }

    function makePlaneDivIcon(headingDeg, kind, color, glow, scale, opacity, isEmergency) {
      const h = typeof headingDeg === "number" ? headingDeg : 0;
      const s = typeof scale === "number" ? scale : 1;
      const o = typeof opacity === "number" ? opacity : 1;
      const classes = `plane-wrap${isEmergency ? " emergency" : ""}`;
      const glowStyle = ENABLE_PLANE_GLOW ? `--planeGlow:${glow};` : "";
      return L.divIcon({
        className: "",
        html: `<div class="${classes}" style="${glowStyle}opacity:${o};transform:rotate(${h}deg) scale(${s})"><svg class="plane-svg" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><g fill="${color}" stroke="rgba(0,0,0,.70)" stroke-width="2.5">${planePath(kind)}</g></svg></div>`,
        iconSize: [36, 36],
        iconAnchor: [18, 18]
      });
    }

    function logoMarkup(code) {
      const safe = esc(code).slice(0, 3);
      const url = airlineLogoUrl(code);
      if (!url) return `<div class="mini-logo-slot"><div class="mini-fallback">${safe}</div></div>`;
      return `<div class="mini-logo-slot"><img alt="" src="${esc(url)}" referrerpolicy="no-referrer" onload="this.style.display='block';this.nextElementSibling.style.display='none'" onerror="this.style.display='none';this.nextElementSibling.style.display='grid'"><div class="mini-fallback">${safe}</div></div>`;
    }

    function ensureLabel(entry) {
      if (entry.labelEl) return;
      const el = document.createElement("div");
      el.className = "label";
      labelsEl.appendChild(el);
      entry.labelEl = el;
      entry.labelHtml = "";
    }

    function labelHtml(entry) {
      const ac = entry.lastPayload || {};
      const callsign = safeText(ac.flight || ac.callsign || "N/A").toUpperCase();
      const airline = airlineCodeFromCallsign(callsign);
      return `<div class="label-top">${logoMarkup(airline)}<div class="label-call">${esc(callsign)}</div><div class="label-state">${stateText(entry.motion)}</div></div>
        <div class="label-metrics"><span>ALT ${esc(fmtAltShort(entry.altFt))} ft</span><span>SPD ${esc(fmtSpeedShort(entry.speedKt))} kt</span><span>${entry.distMi.toFixed(1)} mi</span></div>`;
    }

    function measureLabel(entry) {
      const el = entry.labelEl;
      if (!el) return;
      const pd = el.style.display, pv = el.style.visibility;
      el.style.visibility = "hidden";
      el.style.display = "block";
      const r = el.getBoundingClientRect();
      entry.labelW = Math.ceil(r.width);
      entry.labelH = Math.ceil(r.height);
      el.style.visibility = pv;
      el.style.display = pd;
    }

    function setLabelVisible(entry, visible) {
      if (!entry.labelEl) return;
      if (!ENABLE_LABEL_FADE) {
        entry.labelEl.style.display = visible ? "block" : "none";
        return;
      }
      if (visible) {
        entry.labelEl.style.display = "block";
        requestAnimationFrame(() => entry.labelEl && entry.labelEl.classList.add("visible"));
      } else {
        entry.labelEl.classList.remove("visible");
        setTimeout(() => {
          if (entry.labelEl && !entry.labelEl.classList.contains("visible")) entry.labelEl.style.display = "none";
        }, 300);
      }
    }
    function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }

    function positionLabel(entry) {
      if (!entry.labelEl || !entry.labelWanted) return;
      const p = map.latLngToContainerPoint(entry.marker.getLatLng());
      const mapSize = map.getSize();
      const w = entry.labelW || 102, h = entry.labelH || 38;
      let x = clamp(p.x - w / 2, LABEL_SCREEN_PADDING_PX, mapSize.x - w - LABEL_SCREEN_PADDING_PX);
      let y = clamp(p.y - h - LABEL_OFFSET_Y_PX, LABEL_SCREEN_PADDING_PX, mapSize.y - h - LABEL_SCREEN_PADDING_PX);
      entry.labelEl.style.transform = `translate3d(${Math.round(x)}px,${Math.round(y)}px,0)`;
    }

    function updateLabel(entry) {
      ensureLabel(entry);
      if (!entry.labelWanted) {
        setLabelVisible(entry, false);
        return;
      }
      const html = labelHtml(entry);
      if (html !== entry.labelHtml) {
        entry.labelHtml = html;
        entry.labelEl.innerHTML = html;
        measureLabel(entry);
      }
      entry.labelEl.classList.toggle("emergency", !!entry.isEmergency);
      setLabelVisible(entry, true);
      positionLabel(entry);
    }

    function getCached(cache, key, ttlMs) {
      const v = cache.get(key);
      if (!v) return undefined;
      if (Date.now() - v.ts > ttlMs) { cache.delete(key); return undefined; }
      return v.data;
    }

    function setCached(cache, key, data) { cache.set(key, { ts: Date.now(), data }); }

    function enqueueEnrich(key, pendingSet, job) {
      if (pendingSet.has(key) || enrichQueue.length >= ADSBDB_MAX_QUEUE) return;
      pendingSet.add(key);
      enrichQueue.push(async () => { try { await job(); } finally { pendingSet.delete(key); } });
      runEnrichQueue();
    }

    async function runEnrichQueue() {
      if (enrichBusy) return;
      enrichBusy = true;
      while (enrichQueue.length) {
        const job = enrichQueue.shift();
        try { await job(); } catch (_) {}
        await new Promise(r => setTimeout(r, 300));
      }
      enrichBusy = false;
    }

    async function fetchJson(url, timeoutMs = 2000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const res = await fetch(url, { cache: "no-store", signal: controller.signal });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } finally {
        clearTimeout(timer);
      }
    }

    function parseAdsbdbAircraft(payload) {
      const ac = payload && payload.response && payload.response.aircraft;
      if (!ac) return null;
      return { icaoType: safeText(ac.icao_type), type: safeText(ac.type), manufacturer: safeText(ac.manufacturer), registration: safeText(ac.registration) };
    }

    function requestEnrichment(entry, ac, hex) {
      if (!ADSBDB_ENABLE) return;
      const hx = safeText(hex).toUpperCase();
      if (hx !== "N/A" && entry.aircraftInfo === null) {
        const cached = getCached(hexCache, hx, ADSBDB_HEX_TTL_MS);
        if (cached !== undefined) entry.aircraftInfo = cached;
        else enqueueEnrich(hx, pendingHexKeys, async () => {
          const data = parseAdsbdbAircraft(await fetchJson(`https://api.adsbdb.com/v0/aircraft/${encodeURIComponent(hx)}`));
          setCached(hexCache, hx, data);
          entry.aircraftInfo = data;
          entry.iconDirty = true;
          scheduleVisualUpdate();
        });
      }
    }

    // Creates or updates one aircraft marker, trail, label data, and enrichment request.
    // Draws segmented fading trails. HISTORY_POINTS = 6 means the last 5 update segments.
    function updateTrail(entry, color) {
      const pts = entry.history.map(p => [p.lat, p.lon]);

      if (!ENABLE_FADING_TRAILS) {
        if (!entry.poly) entry.poly = L.polyline([], { weight: 2, opacity: .50, color }).addTo(map);
        entry.poly.setStyle({ color, opacity: .50, weight: 2 });
        entry.poly.setLatLngs(pts);
        return;
      }

      if (entry.poly) {
        map.removeLayer(entry.poly);
        entry.poly = null;
      }

      if (!entry.trailSegments) entry.trailSegments = [];

      while (entry.trailSegments.length < HISTORY_POINTS - 1) {
        entry.trailSegments.push(L.polyline([], { weight: 2, opacity: .1, color }).addTo(map));
      }

      for (let i = 0; i < entry.trailSegments.length; i++) {
        const seg = entry.trailSegments[i];
        const a = pts[i];
        const b = pts[i + 1];
        if (!a || !b) {
          seg.setLatLngs([]);
          continue;
        }
        const ageFactor = (i + 1) / Math.max(1, pts.length - 1);
        seg.setStyle({
          color,
          opacity: .10 + ageFactor * .48,
          weight: 1 + ageFactor * 1.8
        });
        seg.setLatLngs([a, b]);
      }
    }

    function removeAircraftEntry(hex, entry) {
      map.removeLayer(entry.marker);
      if (entry.poly) map.removeLayer(entry.poly);
      if (entry.trailSegments) entry.trailSegments.forEach(seg => map.removeLayer(seg));
      if (entry.labelEl && entry.labelEl.parentNode) entry.labelEl.parentNode.removeChild(entry.labelEl);
      aircraftState.delete(hex);
    }

    function upsertAircraft(ac, nowMs) {
      const hex = safeText(ac.hex).toUpperCase();
      if (hex === "N/A") return null;
      const pos = pickLatLon(ac);
      if (!pos) return null;

      const latLng = L.latLng(pos.lat, pos.lon);
      const altFt = aircraftAltFeet(ac);
      const speedKt = aircraftSpeedKt(ac);
      const fpm = fmtFpm(aircraftVrateFpm(ac));
      const motion = climbStateFromFpm(fpm);
      const heading = aircraftTrackDeg(ac);
      const color = motionColor(motion);

      let entry = aircraftState.get(hex);
      if (!entry) {
        const kind = aircraftClass(ac, null);
        const scale = altitudeScale(altFt);
        const opacity = altitudeOpacity(altFt);
        const emergency = isEmergencySquawk(ac);
        const marker = L.marker(latLng, { icon: makePlaneDivIcon(heading, kind, color, motionGlow(motion), scale, opacity, emergency), interactive: false, keyboard: false, zIndexOffset: emergency ? 1200 : 800 }).addTo(map);
        entry = {
          marker, poly: null, trailSegments: null, history: [], lastSeenTs: nowMs, lastPayload: ac, lastHeading: heading, lastKind: kind, lastColor: color,
          aircraftInfo: null, labelEl: null, labelHtml: "", labelW: 0, labelH: 0, labelWanted: false,
          distMi: 0, altFt, speedKt, fpm, motion, isEmergency: emergency, iconDirty: false, isNearest: false
        };
        aircraftState.set(hex, entry);
      }

      entry.marker.setLatLng(latLng);
      entry.lastSeenTs = nowMs;
      entry.lastPayload = ac;
      entry.distMi = distanceMi(latLng);
      entry.altFt = altFt;
      entry.speedKt = speedKt;
      entry.fpm = fpm;
      entry.motion = motion;

      const kind = aircraftClass(ac, entry.aircraftInfo);
      const scale = altitudeScale(altFt);
      const opacity = altitudeOpacity(altFt);
      const emergency = isEmergencySquawk(ac);
      entry.isEmergency = emergency;

      if (Math.abs((entry.lastHeading || 0) - heading) > 2 || entry.lastKind !== kind || entry.lastColor !== color || entry.iconDirty || entry.lastScale !== scale || entry.lastOpacity !== opacity || entry.lastEmergency !== emergency) {
        entry.marker.setIcon(makePlaneDivIcon(heading, kind, color, motionGlow(motion), scale, opacity, emergency));
        entry.marker.setZIndexOffset(emergency ? 1200 : 800);
        entry.lastHeading = heading;
        entry.lastKind = kind;
        entry.lastColor = color;
        entry.lastScale = scale;
        entry.lastOpacity = opacity;
        entry.lastEmergency = emergency;
        entry.iconDirty = false;
      }

      entry.history.push({ lat: pos.lat, lon: pos.lon, ts: nowMs });
      if (entry.history.length > HISTORY_POINTS) entry.history.shift();
      updateTrail(entry, color);

      requestEnrichment(entry, ac, hex);
      return entry;
    }

    function pruneStale(nowMs) {
      for (const [hex, entry] of aircraftState.entries()) {
        const age = nowMs - entry.lastSeenTs;
        const el = entry.marker.getElement();
        if (el) {
          const wrap = el.querySelector(".plane-wrap");
          if (wrap) wrap.classList.toggle("stale", age > UPDATE_MS * 5);
        }
        if (age > STALE_AIRCRAFT_MS) {
          removeAircraftEntry(hex, entry);
        }
      }
    }

    // Chooses which aircraft labels to show. Closest and lowest aircraft are prioritized.
    function decideLabels() {
      const entries = Array.from(aircraftState.values());
      const eligible = entries.filter(e => isAirborne(e.lastPayload, e.altFt) && e.distMi <= LABEL_MAX_DISTANCE_MI && (typeof e.altFt !== "number" || e.altFt <= LABEL_ONLY_BELOW_FT));
      eligible.sort((a, b) => {
        const altA = typeof a.altFt === "number" ? a.altFt : 999999;
        const altB = typeof b.altFt === "number" ? b.altFt : 999999;
        return (a.distMi - b.distMi) || (altA - altB);
      });
      const keep = new Set(eligible.slice(0, MAX_LABELED_AIRCRAFT));
      const nearest = eligible[0] || null;
      for (const e of entries) {
        e.labelWanted = keep.has(e);
        e.isNearest = e === nearest;
      }
    }

    function updateStatus(kind, text) {
      liveChip.className = `chip ${kind || ""}`.trim();
      liveText.textContent = text;
      countText.textContent = String(aircraftState.size);
      ageText.textContent = fmtAge(state.lastOkMs);
    }

    function scheduleVisualUpdate() {
      if (state.rafPending) return;
      state.rafPending = true;
      requestAnimationFrame(() => {
        state.rafPending = false;
        decideLabels();
        for (const e of aircraftState.values()) {
          updateLabel(e);
          const el = e.marker && e.marker.getElement();
          const wrap = el && el.querySelector(".plane-wrap");
          if (wrap) wrap.classList.toggle("nearest", ENABLE_NEAREST_AIRCRAFT_HALO && !!e.isNearest && !e.isEmergency);
        }
        updateStatus(state.lastStatus === "OK" ? "" : state.lastStatus === "ERR" ? "bad" : "warn", state.lastStatus);
      });
    }

    // Applies altitude filtering and optional nearest-aircraft-only rendering.
    // This reduces marker updates and DOM work, which helps Raspberry Pi playback.
    function selectAircraftToRender(aircraft) {
      const filtered = aircraft
        .filter(ac => passesAltitudeFilter(ac))
        .map(ac => {
          const pos = pickLatLon(ac);
          if (!pos) return null;
          const d = haversineMeters(FETCH_LAT, FETCH_LON, pos.lat, pos.lon) / MI_TO_METERS;
          return { ac, d };
        })
        .filter(Boolean)
        .sort((a, b) => a.d - b.d);

      if (NEAREST_AIRCRAFT_ONLY) return filtered.slice(0, 1).map(x => x.ac);
      return filtered.slice(0, MAX_RENDERED_AIRCRAFT).map(x => x.ac);
    }

    async function fetchWithTimeout(url, timeoutMs) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try { return await fetch(url, { cache: "no-store", signal: controller.signal }); }
      finally { clearTimeout(timer); }
    }

    // Main refresh loop. Fetches nearby aircraft, updates markers, removes stale aircraft, then redraws labels.
    async function tick() {
      if (state.inFlight) return;
      state.inFlight = true;
      state.lastStatus = "UPD";
      updateStatus("warn", "UPD");

      const nowMs = Date.now();
      try {
        const res = await fetchWithTimeout(airplanesLiveUrl(), FETCH_TIMEOUT_MS);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const aircraft = selectAircraftToRender(normalizeAircraftList(await res.json()));
        const visibleHexes = new Set();
        for (const ac of aircraft) {
          const entry = upsertAircraft(ac, nowMs);
          if (entry && ac.hex) visibleHexes.add(String(ac.hex).toUpperCase());
        }

        // Remove aircraft that are no longer selected by the current API response/filter.
        // This prevents ghost-leftover planes when aircraft leave the radius or altitude filter.
        for (const [hex, entry] of aircraftState.entries()) {
          if (!visibleHexes.has(hex)) {
            removeAircraftEntry(hex, entry);
          }
        }

        pruneStale(nowMs);
        state.lastOkMs = Date.now();
        state.lastStatus = "OK";
      } catch (e) {
        state.lastStatus = e && e.name === "AbortError" ? "SLOW" : "ERR";
        pruneStale(nowMs);
      } finally {
        scheduleVisualUpdate();
        state.inFlight = false;
      }
    }

    setInterval(() => {
      for (const e of aircraftState.values()) positionLabel(e);
    }, 220);

    updateStatus("warn", "START");
    tick();
    setInterval(tick, UPDATE_MS);
    setInterval(() => updateStatus(state.lastStatus === "OK" ? "" : "warn", state.lastStatus), 1000);
  </script>
</body>
</html>
