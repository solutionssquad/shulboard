<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Flights v5</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <style>
    :root {
      --yellow: #ffd21f;
      --green: #31d878;
      --red: #ff596d;
      --ground: #9fb6c7;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --font: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #030406;
      font-family: var(--font);
    }

    #app, #map {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    #map {
      z-index: 1;
      background: #050608;
    }

    /* Map darkness only. This does not darken planes, labels, or chips. */
    .leaflet-tile {
      filter: saturate(.92) brightness(.34) contrast(1.28);
      will-change: transform;
    }

    .leaflet-control-container {
      display: none;
    }

    /* Smooth marker movement between API updates. */
    .leaflet-marker-icon {
      transition: transform 1.05s linear !important;
      will-change: transform;
    }

    .leaflet-overlay-pane svg path {
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: none;
    }

    /* Subtle cheap texture, below aircraft and labels. */
    #texture {
      position: absolute;
      inset: 0;
      z-index: 455;
      pointer-events: none;
      opacity: .13;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.35) 0 1px, transparent 1px),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,.24) 0 1px, transparent 1px);
      background-size: 28px 28px, 34px 34px;
      mix-blend-mode: screen;
    }

    .topchips {
      position: absolute;
      top: 7px;
      right: 8px;
      z-index: 900;
      display: flex;
      gap: 5px;
      align-items: center;
      pointer-events: none;
    }

    .chip {
      height: 24px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.13);
      background: rgba(5,7,10,.66);
      backdrop-filter: blur(4px);
      font-family: var(--mono);
      font-size: 10px;
      color: rgba(255,255,255,.9);
      box-shadow: 0 8px 18px rgba(0,0,0,.28);
      white-space: nowrap;
    }

    .chip.polished {
      animation: chipBreath 4.5s ease-in-out infinite;
    }

    @keyframes chipBreath {
      0%, 100% { box-shadow: 0 8px 18px rgba(0,0,0,.28); }
      50% { box-shadow: 0 8px 22px rgba(255,210,31,.15); }
    }

    .live-led {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
    }

    .chip.warn .live-led { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
    .chip.bad .live-led { background: var(--red); box-shadow: 0 0 8px var(--red); }

    .plane-wrap {
      width: 36px;
      height: 36px;
      transform-origin: 50% 50%;
      filter:
        drop-shadow(0 4px 5px rgba(0,0,0,.9))
        drop-shadow(0 0 8px var(--planeGlow, rgba(255,210,31,.6)));
      transition: opacity .25s ease, filter .25s ease;
    }

    .plane-wrap.ground {
      opacity: .78;
      filter:
        drop-shadow(0 3px 4px rgba(0,0,0,.9))
        drop-shadow(0 0 6px rgba(159,182,199,.42));
    }

    .plane-wrap.retained-ground {
      opacity: .58;
      filter:
        drop-shadow(0 2px 3px rgba(0,0,0,.85))
        drop-shadow(0 0 5px rgba(159,182,199,.30));
    }

    .plane-wrap.nearest {
      animation: nearestPulse 2.2s ease-in-out infinite;
    }

    .plane-wrap.emergency {
      animation: emergencyPulse .9s ease-in-out infinite;
    }

    .plane-wrap.stale {
      opacity: .35;
    }

    @keyframes nearestPulse {
      0%, 100% { filter: drop-shadow(0 4px 5px rgba(0,0,0,.9)) drop-shadow(0 0 8px var(--planeGlow, rgba(255,210,31,.6))); }
      50% { filter: drop-shadow(0 4px 6px rgba(0,0,0,.95)) drop-shadow(0 0 15px var(--planeGlow, rgba(255,210,31,.85))); }
    }

    @keyframes emergencyPulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 4px 5px rgba(0,0,0,.9)) drop-shadow(0 0 8px rgba(255,0,0,.75)); }
      50% { transform: scale(1.18); filter: drop-shadow(0 4px 6px rgba(0,0,0,.95)) drop-shadow(0 0 16px rgba(255,0,0,.95)); }
    }

    .plane-svg {
      display: block;
      width: 36px;
      height: 36px;
    }

    .labels {
      position: absolute;
      inset: 0;
      z-index: 780;
      pointer-events: none;
    }

    .label {
      position: absolute;
      transform: translate3d(0,0,0);
      will-change: transform;
      min-width: 156px;
      max-width: 220px;
      padding: 8px 9px;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 13px;
      background: linear-gradient(180deg, rgba(11,14,18,.84), rgba(3,5,8,.72));
      box-shadow:
        0 12px 26px rgba(0,0,0,.52),
        0 0 0 1px rgba(255,210,31,.09),
        0 0 22px rgba(255,210,31,.15);
      backdrop-filter: blur(4px);
      display: none;
      opacity: 0;
      transition: opacity .28s ease;
    }

    .label.visible {
      opacity: .97;
    }

    .label.emergency {
      border-color: rgba(255,89,109,.60);
      box-shadow: 0 12px 26px rgba(0,0,0,.52), 0 0 22px rgba(255,0,0,.30);
    }

    .label-top {
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr) auto;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .mini-logo-slot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: rgba(255,255,255,.90);
      box-shadow: 0 0 10px rgba(255,255,255,.10);
    }

    .mini-logo-slot img {
      width: 24px;
      height: 24px;
      object-fit: contain;
      display: none;
    }

    .mini-fallback {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(255,210,31,.42), rgba(255,255,255,.12));
      color: #fff;
      font-family: var(--mono);
      font-size: 8px;
      font-weight: 900;
      letter-spacing: -.3px;
    }

    .label-call {
      color: var(--yellow);
      font-weight: 950;
      font-size: 15px;
      letter-spacing: .15px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-shadow: 0 0 10px rgba(255,210,31,.20);
    }

    .label-state {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 900;
      color: rgba(255,255,255,.82);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      padding: 2px 5px;
      background: rgba(255,255,255,.06);
    }

    .label-metrics {
      display: grid;
      grid-template-columns: repeat(3, auto);
      gap: 9px;
      margin-top: 7px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 800;
      color: rgba(255,255,255,.88);
    }

    .label-metrics span {
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="map"></div>
    <div id="texture"></div>
    <div id="labels" class="labels"></div>

    <div class="topchips">
      <div class="chip" id="liveChip"><span class="live-led"></span><span id="liveText">START</span></div>
      <div class="chip"><span>AC</span><strong id="countText">0</strong></div>
      <div class="chip"><span>AGE</span><strong id="ageText">n/a</strong></div>
    </div>
  </div>

  <script>
    /***********************************************************************
     * USER SETTINGS
     **********************************************************************/

    // Starting map view.
    const MAP_CENTER_LAT = 26.0702;
    const MAP_CENTER_LON = -80.1850;
    const MAP_ZOOM = 14;

    // Aircraft search center and radius.
    const FETCH_LAT = MAP_CENTER_LAT;
    const FETCH_LON = MAP_CENTER_LON;
    const SEARCH_RADIUS_NM = 2.5;

    // Show all aircraft returned within range, subject to the altitude/ground filters.
    const NEAREST_AIRCRAFT_ONLY = false;
    const MAX_RENDERED_AIRCRAFT = 50;

    // Airborne aircraft filter. Ground aircraft are handled separately below.
    const ENABLE_ALTITUDE_FILTER = true;
    const MIN_AIRCRAFT_ALT_FT = 0;
    const MAX_AIRCRAFT_ALT_FT = 2000;

    // Show aircraft on the ground inside range. They never get labels.
    const SHOW_GROUND_AIRCRAFT = true;

    // The free source may stop returning an aircraft right after touchdown.
    // Keep recently landed/ground aircraft at their last known position for this long.
    const RETAIN_RECENT_GROUND_MS = 12 * 60 * 1000;

    // If an aircraft disappears while low and landing, treat it as a likely landed aircraft.
    const LANDED_RETENTION_ALT_FT = 350;
    const LANDED_RETENTION_MAX_SPEED_KT = 120;

    // Refresh timing. Lower is smoother but harder on Raspberry Pi.
    const UPDATE_MS = 1150;
    const FETCH_TIMEOUT_MS = 1000;
    const STALE_AIRCRAFT_MS = 32000;

    // Labels. Ground aircraft are always excluded from labels.
    const MAX_LABELED_AIRCRAFT = 8;
    const LABEL_MAX_DISTANCE_MI = 2.5;
    const LABEL_ONLY_BELOW_FT = 2000;

    // Trail points. 6 points draw exactly the last 5 update segments.
    const TRAIL_POINTS = 6;

    // Motion state thresholds. airplanes.live vertical rates are already feet per minute.
    const CLIMB_FPM_THRESHOLD = 500;
    const DESC_FPM_THRESHOLD = -500;

    // If the API lacks on_ground but says "ground" in altitude, this still detects ground.
    const GROUND_SPEED_MAX_KT = 45;

    // Label placement.
    const LABEL_SCREEN_PADDING_PX = 7;
    const LABEL_OFFSET_Y_PX = 15;

    // ADSBDB adds aircraft type details. Keep queue low for Raspberry Pi.
    const ADSBDB_ENABLE = true;
    const ADSBDB_HEX_TTL_MS = 24 * 60 * 60 * 1000;
    const ADSBDB_MAX_QUEUE = 4;

    // Local airline logos. Put files like ./airline-logos/DAL.png next to this HTML.
    const USE_LOCAL_AIRLINE_LOGOS = true;
    const LOCAL_AIRLINE_LOGO_DIR = "airline-logos";
    const LOCAL_AIRLINE_LOGO_EXT = "png";

    // Visual effects. Set false if Raspberry Pi struggles.
    const ENABLE_PLANE_GLOW = true;
    const ENABLE_NEAREST_AIRCRAFT_HALO = true;
    const ENABLE_FADING_TRAILS = true;
    const ENABLE_ALTITUDE_SCALE = true;
    const ENABLE_LABEL_FADE = true;
    const ENABLE_TEXTURE_OVERLAY = true;
    const ENABLE_EMERGENCY_HIGHLIGHT = true;
    const ENABLE_IDLE_UI_POLISH = true;

    /***********************************************************************
     * DOM
     **********************************************************************/
    const labelsEl = document.getElementById("labels");
    const textureEl = document.getElementById("texture");
    const liveChip = document.getElementById("liveChip");
    const liveText = document.getElementById("liveText");
    const countText = document.getElementById("countText");
    const ageText = document.getElementById("ageText");

    if (!ENABLE_TEXTURE_OVERLAY && textureEl) textureEl.style.display = "none";
    if (ENABLE_IDLE_UI_POLISH) {
      document.querySelectorAll(".chip").forEach(el => el.classList.add("polished"));
    }

    /***********************************************************************
     * CONSTANTS AND STATE
     **********************************************************************/
    const NM_TO_METERS = 1852;
    const MI_TO_METERS = 1609.344;
    const EARTH_M = 6371000;

    const appState = {
      lastOkMs: null,
      lastStatus: "START",
      inFlight: false,
      rafPending: false
    };

    const aircraftState = new Map();
    const hexCache = new Map();
    const pendingHexKeys = new Set();
    const enrichQueue = [];
    let enrichBusy = false;

    /***********************************************************************
     * UTILS
     **********************************************************************/
    function safeText(v) {
      if (v === null || v === undefined) return "n/a";
      const s = String(v).trim();
      return s.length ? s : "n/a";
    }

    function esc(v) {
      return safeText(v).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function toRad(d) {
      return d * Math.PI / 180;
    }

    function haversineMeters(lat1, lon1, lat2, lon2) {
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) ** 2;
      return 2 * EARTH_M * Math.asin(Math.sqrt(a));
    }

    function fmtAge(ms) {
      if (!ms) return "n/a";
      const s = Math.max(0, Math.round((Date.now() - ms) / 1000));
      return s < 60 ? `${s}s` : `${Math.round(s / 60)}m`;
    }

    function fmtAltShort(feet) {
      if (typeof feet !== "number" || Number.isNaN(feet)) return "GND";
      return feet >= 10000 ? `${Math.round(feet / 100) / 10}k` : `${Math.round(feet)}`;
    }

    function fmtSpeedShort(knots) {
      if (typeof knots !== "number" || Number.isNaN(knots)) return "n/a";
      return `${Math.round(knots)}`;
    }

    /***********************************************************************
     * DATA NORMALIZATION
     * Important: airplanes.live/readsb fields are not metric:
     * - alt_baro and alt_geom are feet or the string "ground"
     * - gs is knots
     * - baro_rate and geom_rate are feet per minute
     **********************************************************************/
    function pickLatLon(ac) {
      if (typeof ac.lat === "number" && typeof ac.lon === "number") return { lat: ac.lat, lon: ac.lon };
      if (ac.lastPosition && typeof ac.lastPosition.lat === "number" && typeof ac.lastPosition.lon === "number") {
        return { lat: ac.lastPosition.lat, lon: ac.lastPosition.lon };
      }
      if (typeof ac.rr_lat === "number" && typeof ac.rr_lon === "number") return { lat: ac.rr_lat, lon: ac.rr_lon };
      return null;
    }

    function rawAltValue(ac) {
      return ac.alt_baro ?? ac.alt_geom ?? ac.altitude ?? ac.alt ?? null;
    }

    function aircraftAltFeet(ac) {
      const a = rawAltValue(ac);
      return typeof a === "number" && Number.isFinite(a) ? a : null;
    }

    function aircraftSpeedKt(ac) {
      const s = ac.gs ?? ac.groundspeed ?? ac.spd ?? ac.speed ?? null;
      return typeof s === "number" && Number.isFinite(s) ? s : null;
    }

    function aircraftVrateFpm(ac) {
      const r = ac.baro_rate ?? ac.geom_rate ?? ac.vertical_rate ?? ac.rate ?? null;
      return typeof r === "number" && Number.isFinite(r) ? Math.round(r) : null;
    }

    function aircraftTrackDeg(ac) {
      const t = ac.track ?? ac.true_heading ?? ac.mag_heading ?? ac.hdg ?? ac.heading ?? null;
      return typeof t === "number" && Number.isFinite(t) ? t : 0;
    }

    function aircraftHex(ac) {
      return safeText(ac.hex ?? ac.icao ?? ac.icao24).toUpperCase();
    }

    function aircraftCallsign(ac) {
      return safeText(ac.flight ?? ac.callsign ?? ac.r ?? ac.hex).toUpperCase().replace(/\s+/g, "");
    }

    function isGroundAircraft(ac, altFt, speedKt) {
      if (!ac) return false;
      if (ac.on_ground === true) return true;
      if (ac.on_ground === "true") return true;
      if (ac.ground === true) return true;

      const rawAlt = rawAltValue(ac);
      if (typeof rawAlt === "string" && rawAlt.toLowerCase() === "ground") return true;
      if (ac.alt_baro === "ground" || ac.alt_geom === "ground") return true;

      // Conservative fallback: if altitude is zero or missing and speed is low, treat as ground.
      if ((altFt === 0 || altFt === null) && typeof speedKt === "number" && speedKt <= GROUND_SPEED_MAX_KT) {
        return true;
      }

      return false;
    }

    function normalizeAircraft(ac) {
      const pos = pickLatLon(ac);
      const hex = aircraftHex(ac);
      if (!pos || hex === "N/A") return null;

      const altFt = aircraftAltFeet(ac);
      const speedKt = aircraftSpeedKt(ac);
      const vrateFpm = aircraftVrateFpm(ac);
      const headingDeg = aircraftTrackDeg(ac);
      const ground = isGroundAircraft(ac, altFt, speedKt);
      const distMi = haversineMeters(FETCH_LAT, FETCH_LON, pos.lat, pos.lon) / MI_TO_METERS;

      return {
        raw: ac,
        hex,
        lat: pos.lat,
        lon: pos.lon,
        latLng: L.latLng(pos.lat, pos.lon),
        callsign: aircraftCallsign(ac),
        altFt,
        speedKt,
        vrateFpm,
        headingDeg,
        ground,
        distMi,
        emergency: isEmergencySquawk(ac),
        retainedGround: false,
        motion: ground ? "ground" : climbStateFromFpm(vrateFpm)
      };
    }

    function passesDisplayFilter(n) {
      if (!n) return false;
      if (n.distMi > SEARCH_RADIUS_NM * 1.15078) return false; // nm to statute miles safety check

      if (n.ground) return SHOW_GROUND_AIRCRAFT;

      if (!ENABLE_ALTITUDE_FILTER) return true;
      if (typeof n.altFt !== "number") return false;
      return n.altFt >= MIN_AIRCRAFT_ALT_FT && n.altFt <= MAX_AIRCRAFT_ALT_FT;
    }

    function selectAircraftToRender(list) {
      const normalized = list
        .map(normalizeAircraft)
        .filter(passesDisplayFilter)
        .sort((a, b) => {
          if (a.ground !== b.ground) return a.ground ? 1 : -1;
          return a.distMi - b.distMi;
        });

      if (NEAREST_AIRCRAFT_ONLY) return normalized.slice(0, 1);
      return normalized.slice(0, MAX_RENDERED_AIRCRAFT);
    }

    function normalizeAircraftList(raw) {
      if (!raw) return [];
      if (Array.isArray(raw.ac)) return raw.ac;
      if (Array.isArray(raw.aircraft)) return raw.aircraft;
      if (Array.isArray(raw)) return raw;
      return [];
    }

    function climbStateFromFpm(fpm) {
      if (typeof fpm !== "number") return "level";
      if (fpm >= CLIMB_FPM_THRESHOLD) return "takeoff";
      if (fpm <= DESC_FPM_THRESHOLD) return "landing";
      return "level";
    }

    function motionColor(motion) {
      if (motion === "takeoff") return "#31d878";
      if (motion === "landing") return "#ff596d";
      if (motion === "ground") return "#9fb6c7";
      return "#ffd21f";
    }

    function motionGlow(motion) {
      if (motion === "takeoff") return "rgba(49,216,120,.72)";
      if (motion === "landing") return "rgba(255,89,109,.72)";
      if (motion === "ground") return "rgba(159,182,199,.45)";
      return "rgba(255,210,31,.62)";
    }

    function motionText(motion) {
      if (motion === "takeoff") return "TKOF";
      if (motion === "landing") return "LAND";
      if (motion === "ground") return "GND";
      return "LVL";
    }

    function altitudeScale(altFt, ground) {
      if (ground) return .82;
      if (!ENABLE_ALTITUDE_SCALE || typeof altFt !== "number") return 1;
      if (altFt < 500) return 1.22;
      if (altFt < 1000) return 1.16;
      if (altFt < 1500) return 1.10;
      return 1.04;
    }

    function altitudeOpacity(altFt, ground) {
      if (ground) return .78;
      if (typeof altFt !== "number") return 1;
      if (altFt > 1800) return .82;
      return 1;
    }

    function isEmergencySquawk(ac) {
      if (!ENABLE_EMERGENCY_HIGHLIGHT) return false;
      const sq = safeText(ac && (ac.squawk ?? ac.sqk)).replace(/^0+/, "");
      return sq === "7700" || sq === "7600" || sq === "7500";
    }

    function airlineCodeFromCallsign(callsign) {
      const cs = safeText(callsign).toUpperCase().replace(/\s+/g, "");
      const m = cs.match(/^([A-Z]{2,3})\d/);
      return m ? m[1] : cs.slice(0, 3);
    }

    function airlineLogoUrl(code) {
      const c = safeText(code).toUpperCase();
      if (c === "N/A" || c.length < 2) return "";
      if (USE_LOCAL_AIRLINE_LOGOS) return `${LOCAL_AIRLINE_LOGO_DIR}/${encodeURIComponent(c)}.${LOCAL_AIRLINE_LOGO_EXT}`;
      return `https://content.airhex.com/content/logos/airlines_${encodeURIComponent(c)}_50_50_s.png`;
    }

    function aircraftClass(raw, aircraftInfo) {
      const t = safeText((aircraftInfo && aircraftInfo.icaoType) || raw.t || raw.type).toUpperCase();
      if (/^H|HELI|EC\d|R44|R66|B06/.test(t)) return "heli";
      if (/C17|C5|A4|BLCF|AN|IL|C130/.test(t)) return "heavy";
      if (/A3|A2|B7|B3|E1|E7|CRJ|MD|DC/.test(t)) return "jet";
      return "prop";
    }

    /***********************************************************************
     * MAP
     **********************************************************************/
    const map = L.map("map", {
      zoomControl: false,
      attributionControl: false,
      preferCanvas: true,
      fadeAnimation: false,
      markerZoomAnimation: false,
      zoomAnimation: false,
      inertia: false,
      dragging: false,
      touchZoom: false,
      scrollWheelZoom: false,
      doubleClickZoom: false,
      boxZoom: false,
      keyboard: false
    });

    L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
      maxZoom: 19,
      updateWhenIdle: true,
      updateWhenZooming: false,
      keepBuffer: 1,
      attribution: "Tiles &copy; Esri"
    }).addTo(map);

    map.setView([MAP_CENTER_LAT, MAP_CENTER_LON], MAP_ZOOM);

    L.circle([FETCH_LAT, FETCH_LON], {
      radius: SEARCH_RADIUS_NM * NM_TO_METERS,
      weight: 1,
      opacity: .24,
      color: "rgba(255,255,255,.72)",
      fillOpacity: .01,
      fillColor: "rgba(255,255,255,.18)"
    }).addTo(map);

    /***********************************************************************
     * ICONS
     **********************************************************************/
    function planePath(kind) {
      if (kind === "heli") return '<path d="M31 22h2v8h12v4H33v8h-2v-8H19v-4h12zM18 16h28v3H18zM29 42h6l5 9H24z"/>';
      if (kind === "heavy") return '<path d="M30 3h4c2 0 3 1.5 3 3.4v17l20 10.5c1.5.8 2.1 2.6 1.3 4.1l-1.4 2.5c-.8 1.4-2.5 1.9-3.9 1.2L37 36v9l9 5.5c1 .6 1.4 1.9.8 3l-1 2c-.6 1.2-2 1.7-3.2 1.1L32 52l-10.6 4.6c-1.2.6-2.6.1-3.2-1.1l-1-2c-.6-1.1-.2-2.4.8-3l9-5.5v-9l-16 5.7c-1.4.7-3.1.2-3.9-1.2L5.7 38c-.8-1.5-.2-3.3 1.3-4.1L27 23.4v-17C27 4.5 28 3 30 3z"/>';
      if (kind === "prop") return '<path d="M30 5h4c1.6 0 2.7 1.2 2.7 2.8v17.5l17.2 10.4c1.3.8 1.8 2.4 1 3.7l-1.2 2c-.7 1.2-2.3 1.7-3.6 1L36.7 36v8.5l7.2 5.4c.9.7 1.2 2 .6 3l-1 1.7c-.6 1.1-2 1.5-3.1.9L32 51.3l-8.4 4.2c-1.1.6-2.5.2-3.1-.9l-1-1.7c-.6-1-.3-2.3.6-3l7.2-5.4V36l-13.4 7.4c-1.3.7-2.9.2-3.6-1l-1.2-2c-.8-1.3-.3-2.9 1-3.7l17.2-10.4V7.8C27.3 6.2 28.4 5 30 5zM25 16h14v3H25z"/>';
      return '<path d="M30 4c1.6 0 3.1 1.2 3.1 3.1v18.1l20.1 12.1c1.4.8 2 2.6 1.2 4l-1.5 2.6c-.8 1.4-2.6 1.9-4 1.1L33.1 36.1v9.1l8 6c1 .8 1.3 2.2.7 3.3l-1.2 2c-.7 1.2-2.2 1.6-3.5 1l-9-4.6-9 4.6c-1.3.6-2.8.2-3.5-1l-1.2-2c-.6-1.1-.3-2.5.7-3.3l8-6v-9.1L15.2 45.1c-1.4.8-3.2.3-4-1.1l-1.5-2.6c-.8-1.4-.2-3.2 1.2-4l20.1-12.1V7.1C31 5.2 32.5 4 30 4z"/>';
    }

    function makePlaneDivIcon(headingDeg, kind, color, glow, scale, opacity, emergency, ground, retainedGround) {
      const h = typeof headingDeg === "number" ? headingDeg : 0;
      const s = typeof scale === "number" ? scale : 1;
      const o = typeof opacity === "number" ? opacity : 1;
      const classes = `plane-wrap${emergency ? " emergency" : ""}${ground ? " ground" : ""}${retainedGround ? " retained-ground" : ""}`;
      const glowStyle = ENABLE_PLANE_GLOW ? `--planeGlow:${glow};` : "";
      return L.divIcon({
        className: "",
        html: `<div class="${classes}" style="${glowStyle}opacity:${o};transform:rotate(${h}deg) scale(${s})"><svg class="plane-svg" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><g fill="${color}" stroke="rgba(0,0,0,.70)" stroke-width="2.5">${planePath(kind)}</g></svg></div>`,
        iconSize: [36, 36],
        iconAnchor: [18, 18]
      });
    }

    /***********************************************************************
     * LABELS
     **********************************************************************/
    function logoMarkup(code) {
      const safe = esc(code).slice(0, 3);
      const url = airlineLogoUrl(code);
      if (!url) return `<div class="mini-logo-slot"><div class="mini-fallback">${safe}</div></div>`;
      return `<div class="mini-logo-slot"><img alt="" src="${esc(url)}" referrerpolicy="no-referrer" onload="this.style.display='block';this.nextElementSibling.style.display='none'" onerror="this.style.display='none';this.nextElementSibling.style.display='grid'"><div class="mini-fallback">${safe}</div></div>`;
    }

    function ensureLabel(entry) {
      if (entry.labelEl) return;
      const el = document.createElement("div");
      el.className = "label";
      labelsEl.appendChild(el);
      entry.labelEl = el;
      entry.labelHtml = "";
      entry.labelW = 0;
      entry.labelH = 0;
    }

    function labelHtml(entry) {
      const n = entry.n;
      const airline = airlineCodeFromCallsign(n.callsign);
      return `<div class="label-top">${logoMarkup(airline)}<div class="label-call">${esc(n.callsign)}</div><div class="label-state">${motionText(n.motion)}</div></div>
        <div class="label-metrics"><span>ALT ${esc(fmtAltShort(n.altFt))} ft</span><span>SPD ${esc(fmtSpeedShort(n.speedKt))}</span><span>${n.distMi.toFixed(1)} mi</span></div>`;
    }

    function measureLabel(entry) {
      const el = entry.labelEl;
      if (!el) return;
      const oldDisplay = el.style.display;
      const oldVis = el.style.visibility;
      el.style.visibility = "hidden";
      el.style.display = "block";
      const r = el.getBoundingClientRect();
      entry.labelW = Math.ceil(r.width);
      entry.labelH = Math.ceil(r.height);
      el.style.visibility = oldVis;
      el.style.display = oldDisplay;
    }

    function setLabelVisible(entry, visible) {
      if (!entry.labelEl) return;

      if (!ENABLE_LABEL_FADE) {
        entry.labelEl.style.display = visible ? "block" : "none";
        return;
      }

      if (visible) {
        entry.labelEl.style.display = "block";
        requestAnimationFrame(() => entry.labelEl && entry.labelEl.classList.add("visible"));
      } else {
        entry.labelEl.classList.remove("visible");
        setTimeout(() => {
          if (entry.labelEl && !entry.labelEl.classList.contains("visible")) entry.labelEl.style.display = "none";
        }, 300);
      }
    }

    function clamp(n, lo, hi) {
      return Math.max(lo, Math.min(hi, n));
    }

    function positionLabel(entry) {
      if (!entry.labelEl || !entry.labelWanted) return;
      const p = map.latLngToContainerPoint(entry.marker.getLatLng());
      const mapSize = map.getSize();
      const w = entry.labelW || 156;
      const h = entry.labelH || 52;
      const x = clamp(p.x - w / 2, LABEL_SCREEN_PADDING_PX, mapSize.x - w - LABEL_SCREEN_PADDING_PX);
      const y = clamp(p.y - h - LABEL_OFFSET_Y_PX, LABEL_SCREEN_PADDING_PX, mapSize.y - h - LABEL_SCREEN_PADDING_PX);
      entry.labelEl.style.transform = `translate3d(${Math.round(x)}px,${Math.round(y)}px,0)`;
    }

    function updateLabel(entry) {
      ensureLabel(entry);

      if (!entry.labelWanted) {
        setLabelVisible(entry, false);
        return;
      }

      const html = labelHtml(entry);
      if (html !== entry.labelHtml) {
        entry.labelHtml = html;
        entry.labelEl.innerHTML = html;
        measureLabel(entry);
      }

      entry.labelEl.classList.toggle("emergency", !!entry.n.emergency);
      setLabelVisible(entry, true);
      positionLabel(entry);
    }

    /***********************************************************************
     * TRAILS AND CLEANUP
     **********************************************************************/
    function updateTrail(entry, color) {
      const pts = entry.history.map(p => [p.lat, p.lon]);

      if (!ENABLE_FADING_TRAILS) {
        if (!entry.poly) entry.poly = L.polyline([], { weight: 2, opacity: .50, color }).addTo(map);
        entry.poly.setStyle({ color, opacity: .50, weight: 2 });
        entry.poly.setLatLngs(pts);
        return;
      }

      if (entry.poly) {
        map.removeLayer(entry.poly);
        entry.poly = null;
      }

      if (!entry.trailSegments) entry.trailSegments = [];

      while (entry.trailSegments.length < TRAIL_POINTS - 1) {
        entry.trailSegments.push(L.polyline([], { weight: 2, opacity: .1, color }).addTo(map));
      }

      for (let i = 0; i < entry.trailSegments.length; i++) {
        const seg = entry.trailSegments[i];
        const a = pts[i];
        const b = pts[i + 1];

        if (!a || !b || entry.n.ground) {
          seg.setLatLngs([]);
          continue;
        }

        const ageFactor = (i + 1) / Math.max(1, pts.length - 1);
        seg.setStyle({
          color,
          opacity: .10 + ageFactor * .48,
          weight: 1 + ageFactor * 1.8
        });
        seg.setLatLngs([a, b]);
      }
    }

    function removeAircraftEntry(hex, entry) {
      if (!entry) return;
      if (entry.marker) map.removeLayer(entry.marker);
      if (entry.poly) map.removeLayer(entry.poly);
      if (entry.trailSegments) entry.trailSegments.forEach(seg => map.removeLayer(seg));
      if (entry.labelEl && entry.labelEl.parentNode) entry.labelEl.parentNode.removeChild(entry.labelEl);
      aircraftState.delete(hex);
    }

    function likelyJustLanded(entry) {
      if (!entry || !entry.n) return false;
      const n = entry.n;
      if (n.ground) return true;
      if (n.motion !== "landing") return false;
      if (typeof n.altFt !== "number" || n.altFt > LANDED_RETENTION_ALT_FT) return false;
      if (typeof n.speedKt === "number" && n.speedKt > LANDED_RETENTION_MAX_SPEED_KT) return false;
      return true;
    }

    function convertToRetainedGround(entry, nowMs) {
      if (!entry || !entry.n || entry.n.retainedGround) return;
      entry.n.ground = true;
      entry.n.retainedGround = true;
      entry.n.motion = "ground";
      entry.n.altFt = 0;
      entry.n.vrateFpm = null;
      entry.labelWanted = false;
      entry.retainedGroundSince = nowMs;
      entry.history = entry.history.slice(-1);
      updateTrail(entry, motionColor("ground"));
      entry.iconDirty = true;
      const kind = entry.lastKind || "jet";
      entry.marker.setIcon(makePlaneDivIcon(entry.n.headingDeg, kind, motionColor("ground"), motionGlow("ground"), .82, .58, false, true, true));
      entry.marker.setZIndexOffset(640);
      if (entry.labelEl) setLabelVisible(entry, false);
    }

    function pruneStale(nowMs) {
      for (const [hex, entry] of aircraftState.entries()) {
        const age = nowMs - entry.lastSeenTs;
        const el = entry.marker && entry.marker.getElement();
        const wrap = el && el.querySelector(".plane-wrap");
        if (wrap) wrap.classList.toggle("stale", age > UPDATE_MS * 5);
        if (entry.n && entry.n.retainedGround) {
          const retainedAge = nowMs - (entry.retainedGroundSince || entry.lastSeenTs || nowMs);
          if (retainedAge > RETAIN_RECENT_GROUND_MS) removeAircraftEntry(hex, entry);
        } else if (age > STALE_AIRCRAFT_MS) {
          removeAircraftEntry(hex, entry);
        }
      }
    }

    /***********************************************************************
     * ENRICHMENT
     **********************************************************************/
    function getCached(cache, key, ttlMs) {
      const v = cache.get(key);
      if (!v) return undefined;
      if (Date.now() - v.ts > ttlMs) {
        cache.delete(key);
        return undefined;
      }
      return v.data;
    }

    function setCached(cache, key, data) {
      cache.set(key, { ts: Date.now(), data });
    }

    function enqueueEnrich(key, pendingSet, job) {
      if (pendingSet.has(key) || enrichQueue.length >= ADSBDB_MAX_QUEUE) return;
      pendingSet.add(key);
      enrichQueue.push(async () => {
        try { await job(); }
        finally { pendingSet.delete(key); }
      });
      runEnrichQueue();
    }

    async function runEnrichQueue() {
      if (enrichBusy) return;
      enrichBusy = true;
      while (enrichQueue.length) {
        const job = enrichQueue.shift();
        try { await job(); } catch (_) {}
        await new Promise(r => setTimeout(r, 300));
      }
      enrichBusy = false;
    }

    async function fetchJson(url, timeoutMs = 2000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const res = await fetch(url, { cache: "no-store", signal: controller.signal });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } finally {
        clearTimeout(timer);
      }
    }

    function parseAdsbdbAircraft(payload) {
      const ac = payload && payload.response && payload.response.aircraft;
      if (!ac) return null;
      return {
        icaoType: safeText(ac.icao_type),
        type: safeText(ac.type),
        manufacturer: safeText(ac.manufacturer),
        registration: safeText(ac.registration)
      };
    }

    function requestEnrichment(entry) {
      if (!ADSBDB_ENABLE) return;
      const hx = entry.n.hex;
      if (hx === "N/A" || entry.aircraftInfo !== null) return;

      const cached = getCached(hexCache, hx, ADSBDB_HEX_TTL_MS);
      if (cached !== undefined) {
        entry.aircraftInfo = cached;
        return;
      }

      enqueueEnrich(hx, pendingHexKeys, async () => {
        const data = parseAdsbdbAircraft(await fetchJson(`https://api.adsbdb.com/v0/aircraft/${encodeURIComponent(hx)}`));
        setCached(hexCache, hx, data);
        entry.aircraftInfo = data;
        entry.iconDirty = true;
        scheduleVisualUpdate();
      });
    }

    /***********************************************************************
     * AIRCRAFT UPSERT
     **********************************************************************/
    function upsertAircraft(n, nowMs) {
      const color = motionColor(n.motion);
      const glow = motionGlow(n.motion);
      const kind = aircraftClass(n.raw, null);
      const scale = altitudeScale(n.altFt, n.ground);
      const opacity = altitudeOpacity(n.altFt, n.ground);

      let entry = aircraftState.get(n.hex);

      if (!entry) {
        const marker = L.marker(n.latLng, {
          icon: makePlaneDivIcon(n.headingDeg, kind, color, glow, scale, opacity, n.emergency, n.ground, n.retainedGround),
          interactive: false,
          keyboard: false,
          zIndexOffset: n.emergency ? 1200 : (n.ground ? 650 : 900)
        }).addTo(map);

        entry = {
          marker,
          poly: null,
          trailSegments: null,
          history: [],
          lastSeenTs: nowMs,
          n,
          aircraftInfo: null,
          labelEl: null,
          labelHtml: "",
          labelW: 0,
          labelH: 0,
          labelWanted: false,
          isNearest: false,
          lastHeading: n.headingDeg,
          lastKind: kind,
          lastColor: color,
          lastScale: scale,
          lastOpacity: opacity,
          lastEmergency: n.emergency,
          lastGround: n.ground,
          lastRetainedGround: n.retainedGround,
          retainedGroundSince: n.retainedGround ? nowMs : null,
          iconDirty: false
        };

        aircraftState.set(n.hex, entry);
      }

      entry.n = n;
      entry.lastSeenTs = nowMs;
      entry.marker.setLatLng(n.latLng);
      entry.marker.setZIndexOffset(n.emergency ? 1200 : (n.ground ? 650 : 900));

      const enrichedKind = aircraftClass(n.raw, entry.aircraftInfo);
      const headingChanged = Math.abs((entry.lastHeading || 0) - n.headingDeg) > 2;
      const visualChanged =
        headingChanged ||
        entry.lastKind !== enrichedKind ||
        entry.lastColor !== color ||
        entry.lastScale !== scale ||
        entry.lastOpacity !== opacity ||
        entry.lastEmergency !== n.emergency ||
        entry.lastGround !== n.ground ||
        entry.lastRetainedGround !== n.retainedGround ||
        entry.iconDirty;

      if (visualChanged) {
        entry.marker.setIcon(makePlaneDivIcon(n.headingDeg, enrichedKind, color, glow, scale, opacity, n.emergency, n.ground));
        entry.lastHeading = n.headingDeg;
        entry.lastKind = enrichedKind;
        entry.lastColor = color;
        entry.lastScale = scale;
        entry.lastOpacity = opacity;
        entry.lastEmergency = n.emergency;
        entry.lastGround = n.ground;
        entry.lastRetainedGround = n.retainedGround;
        entry.iconDirty = false;
      }

      entry.history.push({ lat: n.lat, lon: n.lon, ts: nowMs });
      if (entry.history.length > TRAIL_POINTS) entry.history.shift();
      updateTrail(entry, color);

      requestEnrichment(entry);
      return entry;
    }

    /***********************************************************************
     * LABEL DECISIONS
     **********************************************************************/
    function decideLabels() {
      const entries = Array.from(aircraftState.values());

      const eligible = entries.filter(e => {
        const n = e.n;
        if (!n || n.ground) return false;
        if (n.distMi > LABEL_MAX_DISTANCE_MI) return false;
        if (typeof n.altFt === "number" && n.altFt > LABEL_ONLY_BELOW_FT) return false;
        return true;
      });

      eligible.sort((a, b) => {
        const altA = typeof a.n.altFt === "number" ? a.n.altFt : 999999;
        const altB = typeof b.n.altFt === "number" ? b.n.altFt : 999999;
        return (a.n.distMi - b.n.distMi) || (altA - altB);
      });

      const keep = new Set(eligible.slice(0, MAX_LABELED_AIRCRAFT));
      const nearest = eligible[0] || null;

      for (const e of entries) {
        e.labelWanted = keep.has(e);
        e.isNearest = e === nearest;
      }
    }

    function scheduleVisualUpdate() {
      if (appState.rafPending) return;
      appState.rafPending = true;

      requestAnimationFrame(() => {
        appState.rafPending = false;
        decideLabels();

        for (const entry of aircraftState.values()) {
          updateLabel(entry);
          const el = entry.marker && entry.marker.getElement();
          const wrap = el && el.querySelector(".plane-wrap");
          if (wrap) wrap.classList.toggle("nearest", ENABLE_NEAREST_AIRCRAFT_HALO && !!entry.isNearest && !entry.n.emergency && !entry.n.ground);
        }

        updateStatus(appState.lastStatus === "OK" ? "" : appState.lastStatus === "ERR" ? "bad" : "warn", appState.lastStatus);
      });
    }

    /***********************************************************************
     * API LOOP
     **********************************************************************/
    function airplanesLiveUrl() {
      return `https://api.airplanes.live/v2/point/${encodeURIComponent(FETCH_LAT)}/${encodeURIComponent(FETCH_LON)}/${encodeURIComponent(SEARCH_RADIUS_NM)}?t=${Date.now()}`;
    }

    async function fetchWithTimeout(url, timeoutMs) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        return await fetch(url, { cache: "no-store", signal: controller.signal });
      } finally {
        clearTimeout(timer);
      }
    }

    function updateStatus(kind, text) {
      liveChip.className = `chip ${kind || ""}`.trim();
      liveText.textContent = text;
      countText.textContent = String(aircraftState.size);
      ageText.textContent = fmtAge(appState.lastOkMs);
    }

    async function tick() {
      if (appState.inFlight) return;
      appState.inFlight = true;
      appState.lastStatus = "UPD";
      updateStatus("warn", "UPD");

      const nowMs = Date.now();

      try {
        const res = await fetchWithTimeout(airplanesLiveUrl(), FETCH_TIMEOUT_MS);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const selected = selectAircraftToRender(normalizeAircraftList(await res.json()));
        const visibleHexes = new Set();

        for (const n of selected) {
          const entry = upsertAircraft(n, nowMs);
          if (entry) visibleHexes.add(n.hex);
        }

        // Full reconciliation, with one important exception:
        // if a plane was just seen landing or on the ground, keep it at its last known runway/taxi position.
        // This prevents just-landed aircraft from disappearing when the free source stops returning them.
        for (const [hex, entry] of aircraftState.entries()) {
          if (visibleHexes.has(hex)) continue;

          if (SHOW_GROUND_AIRCRAFT && likelyJustLanded(entry)) {
            convertToRetainedGround(entry, nowMs);
            continue;
          }

          removeAircraftEntry(hex, entry);
        }

        pruneStale(nowMs);
        appState.lastOkMs = Date.now();
        appState.lastStatus = "OK";
      } catch (e) {
        appState.lastStatus = e && e.name === "AbortError" ? "SLOW" : "ERR";
        pruneStale(nowMs);
      } finally {
        scheduleVisualUpdate();
        appState.inFlight = false;
      }
    }

    setInterval(() => {
      for (const e of aircraftState.values()) positionLabel(e);
    }, 220);

    updateStatus("warn", "START");
    tick();
    setInterval(tick, UPDATE_MS);
    setInterval(() => updateStatus(appState.lastStatus === "OK" ? "" : "warn", appState.lastStatus), 1000);
  </script>
</body>
</html>
